<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — fab.games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,600&family=Inter:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--black:#050506;--card:#111114;--border:rgba(255,255,255,0.07);--gold:#c9a84c;--gold2:#e8c96a;--gold3:#fff3b0;--white:#f0efe8;--muted:rgba(240,239,232,0.45);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(201,168,76,0.015) 2px,rgba(201,168,76,0.015) 4px);pointer-events:none;z-index:1;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.1;}50%{opacity:0.8;}}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(5,5,6,0.97);border-bottom:1px solid rgba(201,168,76,0.2);backdrop-filter:blur(20px);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-welcome{font-size:13px;font-weight:600;color:var(--muted);}
.nav-welcome span{color:var(--gold2);}
.hero{text-align:center;padding:60px 20px 50px;position:relative;z-index:2;}
.hero-badge{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,10vw,96px);font-weight:300;line-height:0.95;margin-bottom:16px;}
.hero-title em{font-style:italic;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:15px;color:var(--muted);margin-bottom:32px;}
.hero-line{width:120px;height:1px;margin:0 auto;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);box-shadow:0 0 10px rgba(201,168,76,0.6);}
.wrap{max-width:1400px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:2;}
.section-label{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:28px;display:flex;align-items:center;gap:16px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.3),transparent);}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:3px;}
.game-card{position:relative;overflow:hidden;aspect-ratio:9/14;background:var(--card);text-decoration:none;display:block;transition:all 0.4s cubic-bezier(0.23,1,0.32,1);border:1px solid transparent;}
.game-card:hover{transform:translateY(-8px) scale(1.02);z-index:10;border-color:rgba(201,168,76,0.4);box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 30px rgba(201,168,76,0.15);}
.game-card-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;transition:transform 0.5s ease;}
.game-card:hover .game-card-bg{transform:scale(1.15) rotate(3deg);}
.game-card-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,5,6,0) 25%,rgba(5,5,6,0.97) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px 18px 18px;}
.game-card-cat{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.game-card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;line-height:1.2;margin-bottom:12px;padding:5px 10px;border-radius:3px;display:inline-block;border:1px solid currentColor;animation:neonFlicker 3s ease-in-out infinite;}
@keyframes neonFlicker{0%,18%,20%,52%,54%,100%{opacity:1;}19%,53%{opacity:0.5;}}
.play-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 0;background:linear-gradient(135deg,var(--gold),#a87d2a,var(--gold2),#a87d2a);background-size:200% 200%;border:none;border-radius:3px;color:#000;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 5px 0 #5a3d08,0 0 20px rgba(201,168,76,0.4),inset 0 1px 0 rgba(255,255,255,0.3);transition:all 0.15s;animation:btnShimmer 3s ease infinite;width:100%;}
@keyframes btnShimmer{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.play-btn:hover{box-shadow:0 7px 0 #5a3d08,0 0 40px rgba(201,168,76,0.7);transform:translateY(-2px);}
.live-badge{position:absolute;top:12px;right:12px;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);border-radius:2px;color:var(--gold);animation:livePulse 2s ease-in-out infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 5px rgba(201,168,76,0.2);}50%{box-shadow:0 0 15px rgba(201,168,76,0.6);}}
footer{text-align:center;padding:40px;border-top:1px solid rgba(201,168,76,0.1);font-size:11px;color:rgba(240,239,232,0.2);position:relative;z-index:2;}
@media(max-width:768px){nav{padding:12px 16px;}.wrap{padding:20px 2px 80px;}.games-grid{grid-template-columns:repeat(2,1fr);gap:2px;}.hero{padding:40px 20px 30px;}}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<nav>
  <a href="/" class="nav-logo">fab.games</a>
  <div class="nav-welcome">Welcome <span id="welcomeName">Player</span>! 🌺</div>
</nav>

<div class="hero">
  <div class="hero-badge">✦ Your Games Collection ✦</div>
  <h1 class="hero-title">Let's<br><em>Play!</em></h1>
  <p class="hero-sub">Every game is yours — pick one and have fun!!</p>
  <div class="hero-line"></div>
</div>

<div class="wrap">
  <div class="section-label">All Games</div>
  <div class="games-grid" id="gamesGrid"></div>
</div>

<footer>© 2026 fab.games — Made with 🌺 in Hawaii · <a href="/" style="color:var(--gold);text-decoration:none;">Home</a></footer>

<script>
// Stars
const sw=document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=0.5+Math.random()*2;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
  sw.appendChild(s);
}

// Welcome name
const n=localStorage.getItem('fabName')||'Player';
document.getElementById('welcomeName').textContent=n.split(' ')[0];

// Games
const GAMES=[
  {emoji:'🐬',cat:'Memory · Cards',title:'Dolphin Card Game',href:'https://todayinhawaii.com/dolphins',color:'rgba(34,211,238,0.1)',neon:'#22d3ee',neonbg:'rgba(34,211,238,0.08)'},
  {emoji:'🌋',cat:'Arcade · Strategy',title:"Pele's Fury",href:'https://todayinhawaii.com/lava',color:'rgba(255,60,0,0.1)',neon:'#ff5500',neonbg:'rgba(255,60,0,0.1)'},
  {emoji:'🐢',cat:'Strategy · AI',title:'Turtle Checkers',href:'https://todayinhawaii.com/turtles',color:'rgba(34,197,94,0.1)',neon:'#22c55e',neonbg:'rgba(34,197,94,0.08)'},
  {emoji:'♛',cat:'Strategy · AI',title:'Mermaid Chess',href:'https://todayinhawaii.com/chess',color:'rgba(148,163,184,0.1)',neon:'#a78bfa',neonbg:'rgba(148,100,255,0.08)'},
  {emoji:'🌺',cat:'Trivia · Knowledge',title:'Hawaii Trivia',href:'https://todayinhawaii.com/trivia',color:'rgba(251,191,36,0.1)',neon:'#fbbf24',neonbg:'rgba(251,191,36,0.08)'},
  {emoji:'🧠',cat:'Memory · Speed',title:'Aloha Memory',href:'https://todayinhawaii.com/memorygame',color:'rgba(255,100,200,0.1)',neon:'#f472b6',neonbg:'rgba(255,100,200,0.08)'},
  {emoji:'🔤',cat:'Word · Puzzle',title:'Hawaii Word Search',href:'https://todayinhawaii.com/wordsearch',color:'rgba(167,139,250,0.1)',neon:'#c084fc',neonbg:'rgba(192,132,252,0.08)'},
  {emoji:'🎰',cat:'Word · Strategy',title:'Aloha Letters',href:'https://todayinhawaii.com/scrabble',color:'rgba(255,200,0,0.1)',neon:'#ffd700',neonbg:'rgba(255,200,0,0.08)'},
  {emoji:'🎈',cat:'Action · Fun',title:'Pop That Balloon!',href:'https://todayinhawaii.com/balloons',color:'rgba(255,105,180,0.1)',neon:'#ff69b4',neonbg:'rgba(255,105,180,0.08)'},
  {emoji:'🔮',cat:'Fortune · Fun',title:'Fortune Roulette',href:'https://todayinhawaii.com/fortune',color:'rgba(155,89,182,0.1)',neon:'#d946ef',neonbg:'rgba(217,70,239,0.08)'},
  {emoji:'🎭',cat:'Personality · Fun',title:'Who Are You?',href:'https://todayinhawaii.com/humor',color:'rgba(255,80,80,0.1)',neon:'#ff4444',neonbg:'rgba(255,80,80,0.08)'},
  {emoji:'🧪',cat:'Creative · Art',title:'Slime Artists Factory',href:'https://todayinhawaii.com/slime',color:'rgba(0,220,80,0.1)',neon:'#00dc50',neonbg:'rgba(0,220,80,0.08)'},
  {emoji:'🎞️',cat:'Photography · Creative',title:'Film Lab',href:'https://todayinhawaii.com/camera',color:'rgba(212,168,67,0.1)',neon:'#c9a84c',neonbg:'rgba(212,168,67,0.08)'},
];

const grid=document.getElementById('gamesGrid');
GAMES.forEach(function(g,i){
  const card=document.createElement('a');
  card.href=g.href;
  card.className='game-card';
  const bg=document.createElement('div');
  bg.className='game-card-bg';
  bg.style.background=g.color;
  bg.textContent=g.emoji;
  const badge=document.createElement('div');
  badge.className='live-badge';
  badge.textContent='✦ Live';
  const overlay=document.createElement('div');
  overlay.className='game-card-overlay';
  const cat=document.createElement('div');
  cat.className='game-card-cat';
  cat.textContent=g.cat;
  const title=document.createElement('div');
  title.className='game-card-title';
  title.textContent=g.title;
  title.style.color=g.neon;
  title.style.borderColor=g.neon;
  title.style.background=g.neonbg;
  title.style.textShadow='0 0 8px '+g.neon+',0 0 16px '+g.neon;
  title.style.boxShadow='inset 0 0 8px '+g.neonbg;
  title.style.animationDelay=(Math.random()*3)+'s';
  const btn=document.createElement('div');
  btn.className='play-btn';
  btn.innerHTML='<span>Play Now</span><span>→</span>';
  overlay.appendChild(cat);
  overlay.appendChild(title);
  overlay.appendChild(btn);
  card.appendChild(bg);
  card.appendChild(badge);
  card.appendChild(overlay);
  grid.appendChild(card);
});

// Auth check AFTER games are rendered
setTimeout(function(){
  const email=localStorage.getItem('fabEmail');
  if(!email) window.location.href='/login';
}, 800);
</script>
</body>
</html>
