<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — fab.games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,600&family=Inter:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --black:#050506;--dark:#0d0d0f;--card:#111114;
  --border:rgba(255,255,255,0.07);
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#fff3b0;
  --white:#f0efe8;--muted:rgba(240,239,232,0.45);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  background:var(--black);
  color:var(--white);
  font-family:'Inter',sans-serif;
  font-weight:300;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── ANIMATED STAR FIELD ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{
  position:absolute;background:#fff;border-radius:50%;
  animation:twinkle ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(1);}50%{opacity:0.8;transform:scale(1.3);}}

/* ── GOLD SCANLINES ── */
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(201,168,76,0.015) 2px,rgba(201,168,76,0.015) 4px
  );
  pointer-events:none;z-index:1;
}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 40px;
  background:rgba(5,5,6,0.95);
  border-bottom:1px solid rgba(201,168,76,0.2);
  backdrop-filter:blur(20px);
  box-shadow:0 0 30px rgba(201,168,76,0.08);
}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:26px;letter-spacing:4px;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3),var(--gold));
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:goldShimmer 3s ease infinite;
  text-decoration:none;
}
@keyframes goldShimmer{0%{background-position:0%;}100%{background-position:200%;}}
.nav-welcome{
  font-size:13px;font-weight:600;
  color:var(--muted);letter-spacing:0.5px;
}
.nav-welcome span{
  color:var(--gold2);
  text-shadow:0 0 10px rgba(201,168,76,0.5);
}

/* ── HERO ── */
.hero{
  text-align:center;
  padding:60px 20px 50px;
  position:relative;z-index:2;
}
.hero-badge{
  font-size:9px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);margin-bottom:16px;
  animation:fadeUp 0.6s ease both;
}
.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(48px,10vw,96px);
  font-weight:300;line-height:0.95;
  margin-bottom:16px;
  animation:fadeUp 0.6s 0.1s ease both;
}
.hero-title em{
  font-style:italic;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(201,168,76,0.5));
}
.hero-sub{
  font-size:15px;color:var(--muted);
  animation:fadeUp 0.6s 0.2s ease both;
  margin-bottom:32px;
}
/* Neon divider line */
.hero-line{
  width:120px;height:1px;margin:0 auto;
  background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);
  box-shadow:0 0 10px rgba(201,168,76,0.6),0 0 20px rgba(201,168,76,0.3);
  animation:lineExpand 1s 0.3s ease both;
}
@keyframes lineExpand{0%{width:0;opacity:0;}100%{width:120px;opacity:1;}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(20px);}100%{opacity:1;transform:translateY(0);}}

/* ── GAMES GRID ── */
.wrap{
  max-width:1400px;margin:0 auto;
  padding:40px 20px 100px;
  position:relative;z-index:2;
}
.section-label{
  font-size:9px;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold);margin-bottom:28px;
  display:flex;align-items:center;gap:16px;
}
.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(201,168,76,0.3),transparent);
}
.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:3px;
}

/* ── GAME CARD ── */
.game-card{
  position:relative;overflow:hidden;
  aspect-ratio:9/14;
  background:var(--card);
  text-decoration:none;display:block;
  transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
  border:1px solid transparent;
}
.game-card:hover{
  transform:translateY(-8px) scale(1.02);
  z-index:10;
  border-color:rgba(201,168,76,0.4);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    0 0 30px rgba(201,168,76,0.15),
    inset 0 0 30px rgba(201,168,76,0.03);
}
.game-card-bg{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:72px;
  transition:transform 0.5s ease, filter 0.4s ease;
  filter:drop-shadow(0 4px 20px rgba(0,0,0,0.5));
}
.game-card:hover .game-card-bg{
  transform:scale(1.15) rotate(3deg);
  filter:drop-shadow(0 0 20px rgba(201,168,76,0.4));
}
.game-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(5,5,6,0) 25%,
    rgba(5,5,6,0.6) 55%,
    rgba(5,5,6,0.97) 100%
  );
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:20px 18px 18px;
}
.game-card-cat{
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);margin-bottom:5px;
  opacity:0.9;
}
.game-card-title{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:600;
  line-height:1.2;margin-bottom:12px;
  padding:5px 10px;
  border-radius:3px;
  display:inline-block;
  border:1px solid currentColor;
  animation:neonFlicker 3s ease-in-out infinite;
}
@keyframes neonFlicker{
  0%,18%,20%,52%,54%,100%{opacity:1;}
  19%,53%{opacity:0.5;}
}

/* ── VEGAS PLAY BUTTON ── */
.play-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 0;
  background:linear-gradient(135deg,var(--gold),#a87d2a,var(--gold2),#a87d2a);
  background-size:200% 200%;
  border:none;border-radius:3px;
  color:#000;
  font-size:11px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  box-shadow:
    0 5px 0 #5a3d08,
    0 0 20px rgba(201,168,76,0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
  transition:all 0.15s;
  animation:btnShimmer 3s ease infinite;
  width:100%;
  text-decoration:none;
}
@keyframes btnShimmer{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
.play-btn:hover{
  box-shadow:
    0 7px 0 #5a3d08,
    0 0 40px rgba(201,168,76,0.7),
    0 0 80px rgba(201,168,76,0.3),
    inset 0 1px 0 rgba(255,255,255,0.4);
  transform:translateY(-2px);
}
.play-btn:active{
  transform:translateY(4px);
  box-shadow:0 1px 0 #5a3d08,0 0 20px rgba(201,168,76,0.5);
}
.play-btn-arrow{
  transition:transform 0.2s;
  font-size:14px;
}
.game-card:hover .play-btn-arrow{transform:translateX(4px);}

/* ── LIVE BADGE ── */
.live-badge{
  position:absolute;top:12px;right:12px;
  font-size:8px;letter-spacing:2px;text-transform:uppercase;
  padding:4px 10px;
  background:rgba(201,168,76,0.15);
  border:1px solid rgba(201,168,76,0.4);
  border-radius:2px;color:var(--gold);
  animation:livePulse 2s ease-in-out infinite;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 5px rgba(201,168,76,0.2);}
  50%{box-shadow:0 0 15px rgba(201,168,76,0.6);}
}

/* ── FOOTER ── */
footer{
  text-align:center;padding:40px;
  border-top:1px solid rgba(201,168,76,0.1);
  font-size:11px;color:rgba(240,239,232,0.2);
  position:relative;z-index:2;
  letter-spacing:1px;
}

/* ── MOBILE ── */
@media(max-width:768px){
  nav{padding:12px 16px;}
  .wrap{padding:20px 2px 80px;}
  .section-label{padding:0 16px;margin-bottom:16px;}
  .games-grid{grid-template-columns:repeat(2,1fr);gap:2px;}
  .hero{padding:40px 20px 30px;}
}
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">fab.games</a>
  <div class="nav-welcome">Welcome <span id="welcomeName">Player</span>! 🌺</div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-badge">✦ Your Games Collection ✦</div>
  <h1 class="hero-title">Let's<br><em>Play!</em></h1>
  <p class="hero-sub">Every game is yours — pick one and have fun!!</p>
  <div class="hero-line"></div>
</div>

<!-- GAMES -->
<div class="wrap">
  <div class="section-label">All Games</div>
  <div class="games-grid" id="gamesGrid"></div>
</div>

<footer>© 2026 fab.games — Made with 🌺 in Hawaii · <a href="/" style="color:var(--gold);text-decoration:none;">Home</a></footer>

<script>
// ── ACCESS CHECK ──────────────────────────────────
async function checkAccess(){
  const email = localStorage.getItem('fabEmail');
  if(!email){
    window.location.href='/join';
    return false;
  }
  try{
    const res = await fetch('/api/check-access',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email})
    });
    const data = await res.json();
    if(!data.access){
      window.location.href='/join';
      return false;
    }
    // Show trial days remaining if on trial
    if(data.status==='trial' && data.days_left<=5){
      const bar = document.createElement('div');
      bar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:rgba(201,168,76,0.15);border-top:1px solid rgba(201,168,76,0.3);padding:12px;text-align:center;font-size:12px;color:var(--gold);z-index:999;letter-spacing:1px;';
      bar.innerHTML=`⏰ Your free trial ends in <strong>${data.days_left} day${data.days_left===1?'':'s'}</strong> — <a href="/join?tab=paid" style="color:var(--gold2);font-weight:700;">Subscribe now to keep playing →</a>`;
      document.body.appendChild(bar);
    }
    return true;
  }catch(e){
    // If server error let them in — don't punish for our mistake
    return true;
  }
}
checkAccess();

// ── STARS ─────────────────────────────────────────
const starsWrap=document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const size=0.5+Math.random()*2;
  s.style.cssText=`
    width:${size}px;height:${size}px;
    top:${Math.random()*100}%;left:${Math.random()*100}%;
    animation-duration:${2+Math.random()*4}s;
    animation-delay:${Math.random()*5}s;
  `;
  starsWrap.appendChild(s);
}

// ── WELCOME ───────────────────────────────────────
const name=localStorage.getItem('fabName')||'Player';
document.getElementById('welcomeName').textContent=name.split(' ')[0];

// ── GAMES ─────────────────────────────────────────
const GAMES=[
  {emoji:'🐬',cat:'Memory · Cards',title:'Dolphin Card Game',href:'https://todayinhawaii.com/dolphins',color:'rgba(34,211,238,0.1)',neon:'#22d3ee',neonbg:'rgba(34,211,238,0.08)'},
  {emoji:'🌋',cat:'Arcade · Strategy',title:"Pele's Fury",href:'https://todayinhawaii.com/lava',color:'rgba(255,60,0,0.1)',neon:'#ff5500',neonbg:'rgba(255,60,0,0.1)'},
  {emoji:'🐢',cat:'Strategy · AI',title:'Turtle Checkers',href:'https://todayinhawaii.com/turtles',color:'rgba(34,197,94,0.1)',neon:'#22c55e',neonbg:'rgba(34,197,94,0.08)'},
  {emoji:'♛',cat:'Strategy · AI',title:'Mermaid Chess',href:'https://todayinhawaii.com/chess',color:'rgba(148,163,184,0.1)',neon:'#a78bfa',neonbg:'rgba(148,100,255,0.08)'},
  {emoji:'🌺',cat:'Trivia · Knowledge',title:'Hawaii Trivia',href:'https://todayinhawaii.com/trivia',color:'rgba(251,191,36,0.1)',neon:'#fbbf24',neonbg:'rgba(251,191,36,0.08)'},
  {emoji:'🧠',cat:'Memory · Speed',title:'Aloha Memory',href:'https://todayinhawaii.com/memorygame',color:'rgba(255,100,200,0.1)',neon:'#f472b6',neonbg:'rgba(255,100,200,0.08)'},
  {emoji:'🔤',cat:'Word · Puzzle',title:'Hawaii Word Search',href:'https://todayinhawaii.com/wordsearch',color:'rgba(167,139,250,0.1)',neon:'#c084fc',neonbg:'rgba(192,132,252,0.08)'},
  {emoji:'🎰',cat:'Word · Strategy',title:'Aloha Letters',href:'https://todayinhawaii.com/scrabble',color:'rgba(255,200,0,0.1)',neon:'#ffd700',neonbg:'rgba(255,200,0,0.08)'},
  {emoji:'🎈',cat:'Action · Fun',title:'Pop That Balloon!',href:'https://todayinhawaii.com/balloons',color:'rgba(255,105,180,0.1)',neon:'#ff69b4',neonbg:'rgba(255,105,180,0.08)'},
  {emoji:'🔮',cat:'Fortune · Fun',title:'Fortune Roulette',href:'https://todayinhawaii.com/fortune',color:'rgba(155,89,182,0.1)',neon:'#d946ef',neonbg:'rgba(217,70,239,0.08)'},
  {emoji:'🎭',cat:'Personality · Fun',title:'Who Are You?',href:'https://todayinhawaii.com/humor',color:'rgba(255,80,80,0.1)',neon:'#ff4444',neonbg:'rgba(255,80,80,0.08)'},
  {emoji:'🧪',cat:'Creative · Art',title:'Slime Artists Factory',href:'https://todayinhawaii.com/slime',color:'rgba(0,220,80,0.1)',neon:'#00dc50',neonbg:'rgba(0,220,80,0.08)'},
  {emoji:'🎞️',cat:'Photography · Creative',title:'Film Lab',href:'https://todayinhawaii.com/camera',color:'rgba(212,168,67,0.1)',neon:'#c9a84c',neonbg:'rgba(212,168,67,0.08)'},
];

const grid=document.getElementById('gamesGrid');
GAMES.forEach((g,i)=>{
  const card=document.createElement('a');
  card.href=g.href;
  card.className='game-card';
  card.style.animationDelay=`${i*0.05}s`;
  card.innerHTML=`
    <div class="game-card-bg" style="background:${g.color};">${g.emoji}</div>
    <div class="live-badge">✦ Live</div>
    <div class="game-card-overlay">
      <div class="game-card-cat">${g.cat}</div>
      <div class="game-card-title" style="
        color:${g.neon};
        border-color:${g.neon};
        background:${g.neonbg};
        text-shadow:0 0 8px ${g.neon},0 0 16px ${g.neon},0 0 30px ${g.neon};
        box-shadow:0 0 8px ${g.neonbg},inset 0 0 8px ${g.neonbg};
        animation-delay:${Math.random()*3}s;
      ">${g.title}</div>
      <div class="play-btn">
        <span>Play Now</span>
        <span class="play-btn-arrow">→</span>
      </div>
    </div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
