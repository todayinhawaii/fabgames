<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="fab.games">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#070708">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play — fab.games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,600&family=Inter:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--black:#050506;--card:#111114;--border:rgba(255,255,255,0.07);--gold:#c9a84c;--gold2:#e8c96a;--gold3:#fff3b0;--white:#f0efe8;--muted:rgba(240,239,232,0.45);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(201,168,76,0.015) 2px,rgba(201,168,76,0.015) 4px);pointer-events:none;z-index:1;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.1;}50%{opacity:0.8;}}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 40px;background:rgba(5,5,6,0.97);border-bottom:1px solid rgba(201,168,76,0.2);backdrop-filter:blur(20px);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-welcome{font-size:13px;font-weight:600;color:var(--muted);}
.nav-welcome span{color:var(--gold2);}
.hero{text-align:center;padding:60px 20px 50px;position:relative;z-index:2;}
.hero-badge{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,10vw,96px);font-weight:300;line-height:0.95;margin-bottom:16px;}
.hero-title em{font-style:italic;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:15px;color:var(--muted);margin-bottom:32px;}
.hero-line{width:120px;height:1px;margin:0 auto;background:linear-gradient(90deg,transparent,var(--gold),var(--gold2),var(--gold),transparent);box-shadow:0 0 10px rgba(201,168,76,0.6);}
.wrap{max-width:1400px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:2;}
.section-label{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:28px;display:flex;align-items:center;gap:16px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,0.3),transparent);}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:3px;}

.game-card{position:relative;overflow:hidden;aspect-ratio:9/14;background:var(--card);text-decoration:none;display:block;transition:all 0.4s cubic-bezier(0.23,1,0.32,1);border:1px solid transparent;}
.game-card:hover{transform:translateY(-8px) scale(1.02);z-index:10;border-color:rgba(255,215,0,0.4);box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 30px rgba(255,215,0,0.15);}
.game-card-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;transition:transform 0.5s ease;}
.game-card:hover .game-card-bg{transform:scale(1.15) rotate(3deg);}
.game-card-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,5,6,0) 20%,rgba(5,5,6,0.98) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:16px 14px 14px;}
.game-card-cat{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;opacity:0.7;}
.game-card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;line-height:1.2;margin-bottom:8px;padding:5px 10px;border-radius:3px;display:inline-block;border:1px solid #ffd700;animation:neonFlicker 3s ease-in-out infinite;color:#ffd700!important;text-shadow:0 0 10px #ffd700,0 0 20px rgba(255,215,0,0.5)!important;background:rgba(255,215,0,0.06)!important;box-shadow:inset 0 0 8px rgba(255,215,0,0.08);}
@keyframes neonFlicker{0%,18%,20%,52%,54%,100%{opacity:1;}19%,53%{opacity:0.85;}}
.game-card-desc{font-size:11px;color:rgba(255,255,255,0.65);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.play-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 0;background:linear-gradient(135deg,#ffd700,#c9a84c,#ffd700,#c9a84c);background-size:200% 200%;border:none;border-radius:3px;color:#000;font-size:12px;font-weight:900;letter-spacing:3px;text-transform:uppercase;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 5px 0 #5a3d08,0 0 20px rgba(255,215,0,0.4),inset 0 1px 0 rgba(255,255,255,0.3);transition:all 0.15s;animation:btnShimmer 3s ease infinite;width:100%;margin-bottom:8px;}
@keyframes btnShimmer{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.play-btn:hover{box-shadow:0 7px 0 #5a3d08,0 0 40px rgba(255,215,0,0.7);transform:translateY(-2px);}
.game-dl-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 0;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.25);border-radius:3px;color:rgba(255,215,0,0.6);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:'Inter',sans-serif;cursor:pointer;width:100%;transition:all 0.2s;}
.game-dl-btn:hover{background:rgba(255,215,0,0.12);border-color:rgba(255,215,0,0.5);color:rgba(255,215,0,0.9);}
.live-badge{position:absolute;top:12px;right:12px;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.35);border-radius:2px;color:#ffd700;animation:livePulse 2s ease-in-out infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 5px rgba(255,215,0,0.2);}50%{box-shadow:0 0 15px rgba(255,215,0,0.5);}}

/* PWA INSTALL */
.pwa-bar{
  position:fixed;bottom:0;left:0;right:0;
  z-index:500;
  padding:14px 20px;
  background:rgba(7,7,8,0.97);
  border-top:1px solid rgba(201,168,76,0.2);
  backdrop-filter:blur(20px);
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.pwa-bar.show{display:flex;}
.pwa-bar-text{
  font-size:13px;color:rgba(240,239,232,0.7);
  line-height:1.4;
}
.pwa-bar-text strong{color:#c9a84c;display:block;font-size:14px;margin-bottom:2px;}
.pwa-install-btn{
  flex-shrink:0;
  padding:10px 20px;
  background:linear-gradient(135deg,#c9a84c,#a87d2a);
  color:#000;
  border:none;
  font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;
  font-family:Inter,sans-serif;
  border-radius:2px;
  white-space:nowrap;
  transition:all 0.2s;
}
.pwa-install-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(201,168,76,0.4);}
.pwa-dismiss{
  background:none;border:none;
  color:rgba(240,239,232,0.3);
  font-size:18px;cursor:pointer;
  flex-shrink:0;padding:4px;
}
/* Per-card download button */
.game-dl-btn{
  display:flex;align-items:center;gap:5px;
  margin-top:8px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(201,168,76,0.5);
  background:none;border:none;cursor:pointer;
  font-family:Inter,sans-serif;
  transition:color 0.2s;
  padding:0;
}
.game-dl-btn:hover{color:rgba(201,168,76,0.9);}
.game-dl-btn svg{flex-shrink:0;}

footer{text-align:center;padding:40px;border-top:1px solid rgba(201,168,76,0.1);font-size:11px;color:rgba(240,239,232,0.2);position:relative;z-index:2;}
@media(max-width:768px){nav{padding:12px 16px;}.wrap{padding:20px 2px 80px;}.games-grid{grid-template-columns:repeat(2,1fr);gap:2px;}.hero{padding:40px 20px 30px;}}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<nav>
  <a href="/" class="nav-logo">fab.games</a>
  <div class="nav-welcome">Welcome <span id="welcomeName">Player</span>! 🌺</div>
</nav>

<div class="hero">
  <div class="hero-badge">✦ Your Games Collection ✦</div>
  <h1 class="hero-title">Let's<br><em>Play!</em></h1>
  <p class="hero-sub">Every game is yours — pick one and have fun!!</p>
  <div class="hero-line"></div>
</div>

<div class="wrap">
  <div class="section-label">All Games</div>
  <div class="games-grid" id="gamesGrid"></div>
</div>

<footer>© 2026 fab.games — Made with 🌺 in Hawaii · <a href="/" style="color:var(--gold);text-decoration:none;">Home</a></footer>

<script>
// Stars
const sw=document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const sz=0.5+Math.random()*2;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
  sw.appendChild(s);
}

// Welcome name
const n=localStorage.getItem('fabName')||'Player';
document.getElementById('welcomeName').textContent=n.split(' ')[0];

// Games
const GAMES=[
  {emoji:'🎰',cat:'Arcade · Classic',title:'Pinball Paradise',desc:'Full Vegas pinball! Slingshot launch, spinning bumpers, 4 flippers. Pure arcade magic.',href:'/pinball',color:'rgba(20,80,40,0.15)',neon:'#ffd700',neonbg:'rgba(255,215,0,0.06)'},
  {emoji:'🥕',cat:'Encyclopedia · Quiz',title:'Veggie & Fruit Bible',desc:'77 vegetables and fruits. Real nutrition, botanical art, quizzes and rankings.',href:'/veggies',color:'rgba(184,147,63,0.12)',neon:'#ffd700',neonbg:'rgba(255,215,0,0.06)',featured:true},
  
  {emoji:'🐬',cat:'Memory · Cards',title:'Dolphin Card Game',href:'https://todayinhawaii.com/dolphins',color:'rgba(34,211,238,0.1)',neon:'#22d3ee',neonbg:'rgba(34,211,238,0.08)'},
  {emoji:'🌋',cat:'Arcade · Strategy',title:"Pele's Fury",href:'https://todayinhawaii.com/lava',color:'rgba(255,60,0,0.1)',neon:'#ff5500',neonbg:'rgba(255,60,0,0.1)'},
  {emoji:'🐢',cat:'Strategy · AI',title:'Turtle Checkers',href:'https://todayinhawaii.com/turtles',color:'rgba(34,197,94,0.1)',neon:'#22c55e',neonbg:'rgba(34,197,94,0.08)'},
  {emoji:'♛',cat:'Strategy · AI',title:'Mermaid Chess',href:'https://todayinhawaii.com/chess',color:'rgba(148,163,184,0.1)',neon:'#a78bfa',neonbg:'rgba(148,100,255,0.08)'},
  {emoji:'🌺',cat:'Trivia · Knowledge',title:'Hawaii Trivia',href:'https://todayinhawaii.com/trivia',color:'rgba(251,191,36,0.1)',neon:'#fbbf24',neonbg:'rgba(251,191,36,0.08)'},
  {emoji:'🧠',cat:'Memory · Speed',title:'Aloha Memory',href:'https://todayinhawaii.com/memorygame',color:'rgba(255,100,200,0.1)',neon:'#f472b6',neonbg:'rgba(255,100,200,0.08)'},
  {emoji:'🔤',cat:'Word · Puzzle',title:'Hawaii Word Search',href:'https://todayinhawaii.com/wordsearch',color:'rgba(167,139,250,0.1)',neon:'#c084fc',neonbg:'rgba(192,132,252,0.08)'},
  {emoji:'🎰',cat:'Word · Strategy',title:'Aloha Letters',href:'https://todayinhawaii.com/scrabble',color:'rgba(255,200,0,0.1)',neon:'#ffd700',neonbg:'rgba(255,200,0,0.08)'},
  {emoji:'🎈',cat:'Action · Fun',title:'Pop That Balloon!',href:'https://todayinhawaii.com/balloons',color:'rgba(255,105,180,0.1)',neon:'#ff69b4',neonbg:'rgba(255,105,180,0.08)'},
  {emoji:'🔮',cat:'Fortune · Fun',title:'Fortune Roulette',href:'https://todayinhawaii.com/fortune',color:'rgba(155,89,182,0.1)',neon:'#d946ef',neonbg:'rgba(217,70,239,0.08)'},
  {emoji:'🎭',cat:'Personality · Fun',title:'Who Are You?',href:'https://todayinhawaii.com/humor',color:'rgba(255,80,80,0.1)',neon:'#ff4444',neonbg:'rgba(255,80,80,0.08)'},
  {emoji:'🧪',cat:'Creative · Art',title:'Slime Artists Factory',href:'https://todayinhawaii.com/slime',color:'rgba(0,220,80,0.1)',neon:'#00dc50',neonbg:'rgba(0,220,80,0.08)'},
  {emoji:'🎞️',cat:'Photography · Creative',title:'Film Lab',href:'https://todayinhawaii.com/camera',color:'rgba(212,168,67,0.1)',neon:'#ffd700',neonbg:'rgba(212,168,67,0.08)'},
];

function buildCard(g, href, grid, idx){
  const card=document.createElement('a');
  card.href=href;
  card.className='game-card';
  card.style.textDecoration='none';

  // Background
  const bg=document.createElement('div');
  bg.className='game-card-bg';
  bg.style.background=g.color;
  if(g.featured){
    bg.style.cssText='display:flex;align-items:center;justify-content:center;background:'+g.color+';width:100%;height:100%;position:absolute;inset:0;font-size:0;';
    bg.innerHTML='<svg width="80" height="80" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg"><g stroke="#c9a96e" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"><path d="M90 165 C100 158 110 155 110 155 C110 155 120 158 130 165" stroke-width="1"/><path d="M110 155 C108 140 104 120 100 100" stroke-width="1.2"/><path d="M110 155 C112 138 116 118 122 98" stroke-width="1.2"/><path d="M110 155 C110 138 110 118 110 96" stroke-width="1.1"/><path d="M88 108 C90 100 93 90 92 80 C90 90 86 100 84 108Z" fill="rgba(201,169,110,0.15)" stroke-width="0.8"/><circle cx="110" cy="78" r="18" fill="rgba(201,169,110,0.1)" stroke-width="0.9"/><circle cx="96" cy="108" r="7" fill="rgba(201,169,110,0.12)" stroke-width="0.7"/><circle cx="108" cy="108" r="7" fill="rgba(201,169,110,0.12)" stroke-width="0.7"/></g></svg>';
  } else {
    bg.textContent=g.emoji;
  }

  // Live badge
  const badge=document.createElement('div');
  badge.className='live-badge';
  badge.textContent='✦ Live';

  // Overlay
  const overlay=document.createElement('div');
  overlay.className='game-card-overlay';

  // Category
  const cat=document.createElement('div');
  cat.className='game-card-cat';
  cat.textContent=g.cat;

  // Title — always YELLOW
  const title=document.createElement('div');
  title.className='game-card-title';
  title.textContent=g.title;
  title.style.animationDelay=(Math.random()*3)+'s';

  // Description — bigger font, prominent
  const desc=document.createElement('div');
  desc.className='game-card-desc';
  desc.textContent=g.desc||'';

  // PLAY button — big and bold
  const btn=document.createElement('div');
  btn.className='play-btn';
  btn.innerHTML='<span>▶ Play Now</span>';

  // ADD TO HOME SCREEN — own separate button
  const dlBtn=document.createElement('button');
  dlBtn.className='game-dl-btn';
  dlBtn.id='dlBtn_'+idx;
  dlBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Add to Home Screen';
  dlBtn.onclick=function(e){
    e.preventDefault(); e.stopPropagation();
    if(typeof deferredPrompt!=='undefined' && deferredPrompt){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r){
        if(r.outcome==='accepted'){
          dlBtn.innerHTML='✓ Added!!';
          dlBtn.style.color='rgba(74,222,128,0.8)';
          dlBtn.style.borderColor='rgba(74,222,128,0.4)';
        }
        deferredPrompt=null;
      });
    } else {
      dlBtn.innerHTML='✓ Use browser menu to install';
      setTimeout(()=>{ dlBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Add to Home Screen'; },2500);
    }
  };

  overlay.appendChild(cat);
  overlay.appendChild(title);
  overlay.appendChild(desc);
  overlay.appendChild(btn);
  overlay.appendChild(dlBtn);
  card.appendChild(bg);
  card.appendChild(badge);
  card.appendChild(overlay);
  grid.appendChild(card);
}

// Render play page — cards go directly to the game
const grid=document.getElementById('gamesGrid');
if(grid){
  GAMES.forEach(function(g,i){
    buildCard(g, g.href, grid, i);
  });
}

// Auth check AFTER games are rendered
// Instant auth check
const email=localStorage.getItem('fabEmail');
if(!email) window.location.href='/login';
</script>

<!-- PWA Install Bar -->
<div class="pwa-bar" id="pwaBar">
  <div class="pwa-bar-text">
    <strong>📲 Add fab.games to your home screen</strong>
    All 13 games — one tap away, anytime!!
  </div>
  <button class="pwa-install-btn" id="pwaInstallBtn">Install Free</button>
  <button class="pwa-dismiss" id="pwaDismiss" aria-label="Dismiss">✕</button>
</div>

<script>
// ── SERVICE WORKER ─────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg=>console.log('[fab.games] SW registered:', reg.scope))
      .catch(err=>console.log('[fab.games] SW failed:', err));
  });
}

// ── PWA INSTALL PROMPT ─────────────────────────
let deferredPrompt = null;
const pwaBar = document.getElementById('pwaBar');
const pwaBtn = document.getElementById('pwaInstallBtn');
const pwaDismiss = document.getElementById('pwaDismiss');

window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  // Show bar after 3 seconds
  setTimeout(()=>{ pwaBar.classList.add('show'); }, 3000);
});

pwaBtn.addEventListener('click', async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if(outcome === 'accepted'){
    pwaBar.classList.remove('show');
    pwaBtn.textContent = '✓ Added!!';
  }
  deferredPrompt = null;
});

pwaDismiss.addEventListener('click', ()=>{
  pwaBar.classList.remove('show');
  sessionStorage.setItem('pwaDismissed','1');
});

// Hide if already dismissed this session
if(sessionStorage.getItem('pwaDismissed')) pwaBar.style.display='none';

// Already installed check
window.addEventListener('appinstalled', ()=>{
  pwaBar.classList.remove('show');
  console.log('[fab.games] PWA installed!!');
});
</script>
</body>
</html>
