<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🔮 Fortune Roulette — Today in Hawaii</title>
  <meta name="description" content="Spin the Vegas Fortune Roulette wheel and discover your destiny! Gypsy wisdom meets Hawaiian aloha.">
  <link rel="icon" href="/icon-192.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

    body{
      min-height:100vh;
      font-family:system-ui,sans-serif;
      background:#0a0010;
      overflow-x:hidden;
      overflow-y:auto;
      color:#e8f4f8;
    }

    /* Mystical animated background */
    #mysticBg{
      position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse at 50% 0%,#2a0040 0%,#0a0010 60%);
      overflow:hidden;
    }

    /* Stars */
    .star{
      position:absolute;background:white;border-radius:50%;
      animation:twinkle ease-in-out infinite;
    }
    @keyframes twinkle{
      0%,100%{opacity:0.1;transform:scale(1);}
      50%{opacity:0.9;transform:scale(1.3);}
    }

    /* Floating mystic particles */
    .mystic-particle{
      position:absolute;
      font-size:20px;
      animation:mystFloat linear infinite;
      opacity:0;
    }
    @keyframes mystFloat{
      0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
      10%{opacity:0.6;}
      90%{opacity:0.4;}
      100%{transform:translateY(-100px) rotate(360deg);opacity:0;}
    }

    /* Vegas neon border effect */
    .neon-border{
      border:2px solid #9b59b6;
      box-shadow:
        0 0 8px #9b59b6,
        0 0 20px rgba(155,89,182,0.4),
        inset 0 0 12px rgba(155,89,182,0.1);
    }

    /* Main wrap */
    .wrap{
      position:relative;z-index:1;
      max-width:480px;margin:0 auto;
      padding:16px 16px 60px;
      display:flex;flex-direction:column;
      align-items:center;min-height:100vh;
    }

    /* Header */
    .hdr{text-align:center;padding:10px 0 16px;}
    .hdr-crystal{
      font-size:56px;
      animation:crystalGlow 2s ease-in-out infinite alternate;
      filter:drop-shadow(0 0 16px rgba(155,89,182,0.8));
      display:block;margin-bottom:6px;
    }
    @keyframes crystalGlow{
      0%{filter:drop-shadow(0 0 10px rgba(155,89,182,0.6));}
      100%{filter:drop-shadow(0 0 28px rgba(200,100,255,1)) drop-shadow(0 0 50px rgba(155,89,182,0.5));}
    }
    /* Slow 3D crystal rotation */
    .hdr-crystal{
      animation:crystalGlow 2s ease-in-out infinite alternate,
                crystalRotate3D 6s ease-in-out infinite!important;
      transform-style:preserve-3d;
    }
    @keyframes crystalRotate3D{
      0%  {transform:rotateY(0deg)   rotateZ(0deg)   scale(1);}
      25% {transform:rotateY(90deg)  rotateZ(5deg)   scale(1.05);}
      50% {transform:rotateY(180deg) rotateZ(0deg)   scale(1);}
      75% {transform:rotateY(270deg) rotateZ(-5deg)  scale(1.05);}
      100%{transform:rotateY(360deg) rotateZ(0deg)   scale(1);}
    }
    .hdr-title{
      font-size:28px;font-weight:900;letter-spacing:-0.5px;
      background:linear-gradient(135deg,#ffd700,#ff8c00,#ff0080,#9b59b6,#ffd700);
      background-size:300% auto;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:titleRainbow 4s linear infinite;
    }
    @keyframes titleRainbow{
      0%{background-position:0% center;}
      100%{background-position:300% center;}
    }
    .hdr-sub{
      font-size:13px;color:#c39bd3;margin-top:4px;
      font-style:italic;
      text-shadow:0 0 10px rgba(155,89,182,0.5);
    }

    /* Roulette wheel container */
    .wheel-wrap{
      position:relative;
      width:min(340px,90vw);
      height:min(340px,90vw);
      margin:10px auto 16px;
    }

    /* Outer ring glow */
    .wheel-outer{
      position:absolute;inset:-8px;
      border-radius:50%;
      background:conic-gradient(
        #ffd700,#ff8c00,#ff0080,#9b59b6,#4fc3f7,
        #22c55e,#ffd700,#ff8c00,#ff0080,#9b59b6,
        #4fc3f7,#22c55e,#ffd700
      );
      animation:outerSpin 8s linear infinite;
      filter:blur(4px);
      opacity:0.6;
    }
    @keyframes outerSpin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

    /* The wheel itself */
    #wheel{
      position:absolute;inset:8px;
      border-radius:50%;
      border:4px solid rgba(255,215,0,0.6);
      box-shadow:
        0 0 20px rgba(155,89,182,0.6),
        0 0 40px rgba(155,89,182,0.3),
        inset 0 0 30px rgba(0,0,0,0.5);
      overflow:hidden;
      transform:rotate(0deg);
      will-change:transform;
      cursor:pointer;
    }
    #wheel canvas{
      width:100%;height:100%;
      display:block;
    }

    /* Center jewel */
    .wheel-center{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:48px;height:48px;
      border-radius:50%;
      background:radial-gradient(circle,#ffd700,#ff8c00,#8b4513);
      border:3px solid #ffd700;
      box-shadow:0 0 16px rgba(255,215,0,0.8),0 0 32px rgba(255,140,0,0.4);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;z-index:5;
      animation:jewelPulse 1.5s ease-in-out infinite alternate;
    }
    @keyframes jewelPulse{
      0%{box-shadow:0 0 16px rgba(255,215,0,0.8),0 0 32px rgba(255,140,0,0.4);}
      100%{box-shadow:0 0 28px rgba(255,215,0,1),0 0 56px rgba(255,140,0,0.7);}
    }

    /* Pointer / Arrow */
    .wheel-pointer{
      position:absolute;
      top:-4px;left:50%;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:14px solid transparent;
      border-right:14px solid transparent;
      border-top:40px solid #ffd700;
      filter:drop-shadow(0 0 8px rgba(255,215,0,0.9));
      z-index:10;
    }

    /* Spin button */
    .spin-btn{
      width:min(300px,85vw);
      padding:18px;
      border:none;border-radius:99px;
      font-size:18px;font-weight:900;
      cursor:pointer;font-family:inherit;
      letter-spacing:1px;text-transform:uppercase;
      position:relative;overflow:hidden;
      background:linear-gradient(180deg,#ffe566 0%,#f5c800 20%,#e6a800 50%,#c87800 80%,#f5c800 100%);
      color:#3a1a00;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.5) inset,
        0 -2px 0 rgba(0,0,0,0.25) inset,
        0 8px 0 #8b5000,
        0 10px 24px rgba(0,0,0,0.6),
        0 0 30px rgba(255,200,0,0.4);
      transition:all 0.1s;
      text-shadow:0 1px 0 rgba(255,255,255,0.4);
      margin-bottom:20px;
    }
    .spin-btn::after{
      content:'';position:absolute;
      top:4px;left:10px;right:10px;height:38%;
      background:linear-gradient(180deg,rgba(255,255,255,0.35),transparent);
      border-radius:99px 99px 50% 50%;pointer-events:none;
    }
    .spin-btn:active:not(:disabled){
      transform:translateY(6px);
      box-shadow:0 1px 0 rgba(255,255,255,0.5) inset,0 2px 0 #8b5000,0 4px 10px rgba(0,0,0,0.4);
    }
    .spin-btn:disabled{
      opacity:0.6;cursor:not-allowed;transform:none;
      box-shadow:0 4px 0 #8b5000,0 6px 14px rgba(0,0,0,0.4);
    }
    .spin-btn.glowing{
      animation:spinBtnGlow 1s ease-in-out infinite;
    }
    @keyframes spinBtnGlow{
      0%,100%{box-shadow:0 1px 0 rgba(255,255,255,0.5) inset,0 -2px 0 rgba(0,0,0,0.25) inset,0 8px 0 #8b5000,0 10px 24px rgba(0,0,0,0.6),0 0 30px rgba(255,200,0,0.4);}
      50%{box-shadow:0 1px 0 rgba(255,255,255,0.5) inset,0 -2px 0 rgba(0,0,0,0.25) inset,0 8px 0 #8b5000,0 10px 24px rgba(0,0,0,0.6),0 0 60px rgba(255,200,0,1),0 0 100px rgba(255,150,0,0.5);}
    }

    /* Ancient Scroll Fortune Box */
    #fortuneBox{
      width:min(400px,92vw);
      min-height:160px;
      position:relative;
      margin-bottom:16px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;
      transition:all 0.5s;
      padding:28px 28px 24px;

      /* Parchment scroll background */
      background:
        radial-gradient(ellipse at 50% 0%,rgba(255,230,150,0.12) 0%,transparent 60%),
        radial-gradient(ellipse at 50% 100%,rgba(255,200,100,0.08) 0%,transparent 60%),
        linear-gradient(180deg,
          rgba(60,30,10,0.95) 0%,
          rgba(40,15,5,0.98) 20%,
          rgba(35,12,3,0.99) 50%,
          rgba(40,15,5,0.98) 80%,
          rgba(60,30,10,0.95) 100%
        );

      /* Aged paper texture via border */
      border-top:3px solid rgba(180,120,40,0.6);
      border-bottom:3px solid rgba(180,120,40,0.6);
      border-left:1px solid rgba(140,90,30,0.3);
      border-right:1px solid rgba(140,90,30,0.3);

      box-shadow:
        0 -8px 0 rgba(100,60,20,0.4),
        0 8px 0 rgba(100,60,20,0.4),
        0 0 30px rgba(155,89,182,0.15),
        inset 0 0 40px rgba(0,0,0,0.4);
    }

    /* Scroll rollers — top and bottom */
    #fortuneBox::before,
    #fortuneBox::after{
      content:'';
      position:absolute;
      left:-8px;right:-8px;
      height:22px;
      border-radius:11px;
      background:linear-gradient(180deg,
        #8B5E3C 0%,#C8912A 25%,#FFD700 50%,#C8912A 75%,#8B5E3C 100%
      );
      box-shadow:
        0 0 10px rgba(255,215,0,0.4),
        0 3px 6px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.3);
      z-index:2;
    }
    #fortuneBox::before{top:-11px;}
    #fortuneBox::after{bottom:-11px;}

    /* Scroll roller end knobs */
    .scroll-knob-left,.scroll-knob-right{
      position:absolute;
      width:16px;height:28px;
      border-radius:8px;
      background:linear-gradient(90deg,#6B3A1F,#C8912A,#FFD700,#C8912A,#6B3A1F);
      box-shadow:0 0 8px rgba(255,215,0,0.5),0 2px 4px rgba(0,0,0,0.4);
      z-index:3;top:50%;transform:translateY(-50%);
    }
    .scroll-knob-left{left:-12px;}
    .scroll-knob-right{right:-12px;}

    /* Aged scroll edge lines */
    .scroll-edge-top,.scroll-edge-bottom{
      position:absolute;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,rgba(180,120,40,0.4),rgba(200,140,50,0.6),rgba(180,120,40,0.4),transparent);
      z-index:1;
    }
    .scroll-edge-top{top:14px;}
    .scroll-edge-bottom{bottom:14px;}

    /* Mystic rune decorations */
    .scroll-rune-left,.scroll-rune-right{
      position:absolute;
      font-size:14px;opacity:0.3;
      top:50%;transform:translateY(-50%);
      color:#ffd700;
    }
    .scroll-rune-left{left:8px;}
    .scroll-rune-right{right:8px;}

    #fortuneBox.revealed{
      background:
        radial-gradient(ellipse at 50% 0%,rgba(255,230,150,0.15) 0%,transparent 60%),
        radial-gradient(ellipse at 50% 100%,rgba(200,150,80,0.1) 0%,transparent 60%),
        linear-gradient(180deg,
          rgba(60,30,10,0.95) 0%,
          rgba(40,15,5,0.98) 20%,
          rgba(35,12,3,0.99) 50%,
          rgba(40,15,5,0.98) 80%,
          rgba(60,30,10,0.95) 100%
        );
      border-top-color:rgba(255,215,0,0.8);
      border-bottom-color:rgba(255,215,0,0.8);
      box-shadow:
        0 -8px 0 rgba(180,100,20,0.5),
        0 8px 0 rgba(180,100,20,0.5),
        0 0 40px rgba(155,89,182,0.3),
        0 0 80px rgba(255,215,0,0.1),
        inset 0 0 40px rgba(0,0,0,0.4);
      animation:scrollReveal 0.6s ease;
    }
    @keyframes scrollReveal{
      0%{transform:scaleY(0.3);opacity:0;}
      60%{transform:scaleY(1.05);}
      100%{transform:scaleY(1);opacity:1;}
    }

    .fortune-crystal{
      font-size:32px;margin-bottom:8px;
      animation:innerCrystalSpin 4s ease-in-out infinite;
      display:none;
      filter:drop-shadow(0 0 8px currentColor);
    }
    @keyframes innerCrystalSpin{
      0%  {transform:rotateY(0deg)   scale(1);}
      25% {transform:rotateY(90deg)  scale(1.1);}
      50% {transform:rotateY(180deg) scale(1);}
      75% {transform:rotateY(270deg) scale(1.1);}
      100%{transform:rotateY(360deg) scale(1);}
    }
    .fortune-crystal.show{display:block;}

    #fortuneText{
      font-size:17px;font-weight:700;
      line-height:1.6;
      color:#f5deb3;
      text-shadow:
        0 0 8px rgba(255,215,0,0.3),
        0 1px 2px rgba(0,0,0,0.8);
      font-style:italic;
      min-height:60px;
      display:flex;align-items:center;justify-content:center;
      position:relative;z-index:1;
      font-family:Georgia,serif;
      letter-spacing:0.3px;
    }
    .fortune-placeholder{
      font-size:13px;
      color:rgba(180,140,80,0.6);
      font-style:italic;
      font-family:Georgia,serif;
    }

    .fortune-color-bar{
      width:60px;height:3px;
      border-radius:99px;
      margin:10px auto 0;
      display:none;
    }
    .fortune-color-bar.show{display:block;}

    /* Fortune category badge */
    .fortune-cat{
      font-size:10px;font-weight:700;
      letter-spacing:0.2em;text-transform:uppercase;
      padding:3px 14px;
      border-radius:99px;
      margin-bottom:10px;
      display:none;
      font-family:Georgia,serif;
    }
    .fortune-cat.show{display:inline-block;}

    /* History of fortunes */
    .history-wrap{
      width:min(400px,92vw);
      margin-bottom:16px;
    }
    .history-title{
      font-size:11px;font-weight:700;
      color:#9b59b6;text-transform:uppercase;
      letter-spacing:0.12em;margin-bottom:8px;
      text-align:center;
      text-shadow:0 0 8px rgba(155,89,182,0.5);
    }
    .history-item{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(155,89,182,0.15);
      border-radius:12px;padding:8px 14px;
      margin-bottom:6px;
      font-size:12px;color:#c39bd3;
      font-style:italic;
      display:flex;align-items:center;gap:8px;
      animation:fadeSlideIn 0.4s ease;
    }
    @keyframes fadeSlideIn{
      0%{opacity:0;transform:translateY(-10px);}
      100%{opacity:1;transform:translateY(0);}
    }
    .history-dot{
      width:8px;height:8px;border-radius:50%;flex-shrink:0;
    }

    /* Mystic decorations */
    .mystic-divider{
      width:100%;text-align:center;
      font-size:16px;margin:6px 0;
      color:#9b59b6;opacity:0.5;
      letter-spacing:8px;
    }

    /* Share button */
    .share-btn{
      padding:11px 28px;border:none;border-radius:99px;
      font-size:13px;font-weight:700;cursor:pointer;
      font-family:inherit;
      background:linear-gradient(135deg,#1877f2,#0d65d9);
      color:#fff;
      box-shadow:0 4px 14px rgba(24,119,242,0.4);
      display:none;
      transition:all 0.15s;
    }
    .share-btn.show{display:inline-block;}
    .share-btn:active{transform:scale(0.97);}

    /* Confetti */
    .confetti{position:fixed;pointer-events:none;z-index:999;}

    /* Back link */
    .back{
      text-align:center;margin-top:16px;
      font-size:13px;color:#7d6b8a;
    }
    .back a{color:#9b59b6;text-decoration:none;font-weight:600;}

    /* Spin counter */
    .spin-count{
      font-size:11px;color:#7d6b8a;
      text-align:center;margin-bottom:10px;
    }
  
    .signup-form{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;align-items:center;}
    .signup-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.07);
      border:2px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;
      font-size:14px;font-family:system-ui,sans-serif;outline:none;text-align:center;
      transition:border-color 0.2s;}
    .signup-input:focus{border-color:rgba(255,255,255,0.6);}
    .signup-input::placeholder{color:rgba(255,255,255,0.35);}
    .signup-label{font-size:9px;font-weight:900;text-transform:uppercase;
      letter-spacing:0.12em;color:rgba(255,255,255,0.5);
      margin-bottom:-6px;align-self:flex-start;padding-left:4px;}
    </style>
</head>
<body>

<!-- Mystic background -->
<div id="mysticBg"></div>

<div class="wrap">
  <!-- Header -->
  <div class="hdr">
    <span class="hdr-crystal">🔮</span>
    <div class="hdr-title">Fortune Roulette</div>
    <div class="hdr-sub">✨ The stars know your destiny · Spin to reveal ✨</div>
  </div>

  <!-- Wheel -->
  <div class="wheel-wrap">
    <div class="wheel-outer"></div>
    <div id="wheel">
      <canvas id="wheelCanvas"></canvas>
    </div>
    <div class="wheel-center">🔮</div>
    <div class="wheel-pointer"></div>
  </div>

  <!-- Spin count -->
  <div class="spin-count" id="spinCount">🌟 Your destiny awaits...</div>

  <!-- Spin button -->
  <div class="signup-form">
            <span class="signup-label">Your Full Name</span>
            <input class="signup-input" id="playerName"
              placeholder="e.g. Sarah Johnson" maxlength="30"
              onkeydown="if(event.key==='Enter')document.getElementById('playerUser').focus()">
            <span class="signup-label">Choose a Username</span>
            <input class="signup-input" id="playerUser"
              placeholder="e.g. SurfQueen808" maxlength="20"
              onkeydown="if(event.key==='Enter')document.getElementById('playerLoc').focus()">
            <span class="signup-label">Country, City or Island 🌺</span>
            <input class="signup-input" id="playerLoc"
              placeholder="e.g. Maui, Hawaii" maxlength="30"
              onkeydown="if(event.key==='Enter')beginGame()">
          </div>
          <button class="spin-btn glowing" id="spinBtn" onclick="beginGame()">
    🔮 SPIN YOUR FORTUNE!
  </button>

  <!-- Ancient Scroll Fortune Display -->
  <div id="fortuneBox">
    <!-- Scroll decorations -->
    <div class="scroll-knob-left"></div>
    <div class="scroll-knob-right"></div>
    <div class="scroll-edge-top"></div>
    <div class="scroll-edge-bottom"></div>
    <div class="scroll-rune-left">⚜</div>
    <div class="scroll-rune-right">⚜</div>
    <!-- Content -->
    <div class="fortune-cat" id="fortuneCat"></div>
    <div class="fortune-crystal" id="fortuneCrystal">🔮</div>
    <div id="fortuneText">
      <span class="fortune-placeholder">✨ Spin the wheel to reveal your fortune... ✨</span>
    </div>
    <div class="fortune-color-bar" id="fortuneBar"></div>
  </div>

  <!-- Share -->
  <button class="share-btn" id="shareBtn" onclick="shareFortune()">
    📘 Share My Fortune!
  </button>

  <div class="mystic-divider">· · · ✦ · · ·</div>

  <!-- History -->
  <div class="history-wrap">
    <div class="history-title" id="historyTitle" style="display:none;">📜 Your Recent Fortunes</div>
    <div id="historyList"></div>
  </div>

  <div class="back"><a href="/games">← Back to Games Hub 🎮</a></div>
</div>

// ── Draw Wheel ────────────────────────────────
function drawWheel(){
  const canvas = document.getElementById('wheelCanvas');
  const size = canvas.parentElement.offsetWidth;
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size/2, cy = size/2, r = size/2 - 2;
  const slice = (Math.PI*2) / NUM_SEGMENTS;

  FORTUNES.forEach((f, i) => {
    const startAngle = i * slice - Math.PI/2;
    const endAngle = startAngle + slice;

    // Segment
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();

    // Alternating shades within category
    const baseColor = f.color;
    ctx.fillStyle = i%2===0 ? baseColor : adjustColor(baseColor, -20);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Icon label on wheel
    const midAngle = startAngle + slice/2;
    const labelR = r * 0.72;
    const lx = cx + Math.cos(midAngle) * labelR;
    const ly = cy + Math.sin(midAngle) * labelR;

    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(midAngle + Math.PI/2);
    ctx.font = `${Math.max(10,size*0.028)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.icon, 0, 0);
    ctx.restore();
  });

  // Inner circle
  ctx.beginPath();
  ctx.arc(cx, cy, r*0.18, 0, Math.PI*2);
  ctx.fillStyle = '#0a0010';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function adjustColor(hex, amount){
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (num>>16) + amount));
  const g = Math.min(255, Math.max(0, ((num>>8)&0xff) + amount));
  const b = Math.min(255, Math.max(0, (num&0xff) + amount));
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function spinWheel(){
  if(spinning) return;
  spinning = true;
  spinCount++;

  document.getElementById('spinBtn').disabled = true;
  document.getElementById('spinBtn').classList.remove('glowing');
  document.getElementById('shareBtn').classList.remove('show');

  // Clear current fortune
  document.getElementById('fortuneText').innerHTML = '<span style="color:#9b59b6;font-size:24px;animation:crystalGlow 0.5s ease-in-out infinite alternate;">🔮</span>';
  document.getElementById('fortuneBox').classList.remove('revealed');
  document.getElementById('fortuneCat').classList.remove('show');
  document.getElementById('fortuneCrystal').classList.remove('show');
  document.getElementById('fortuneBar').classList.remove('show');

  playSpinSound();

  // Random spin — 5-10 full rotations plus random stop
  const extraSpins = 5 + Math.random() * 5;
  const targetRotation = currentAngle + extraSpins * 360 + Math.random() * 360;

  // Determine which fortune we'll land on
  const slice = 360 / NUM_SEGMENTS;
  const normalizedAngle = ((targetRotation % 360) + 360) % 360;
  // Pointer is at top (0°) — calculate which segment is at top
  const fortuneIdx = Math.floor(((360 - normalizedAngle) % 360) / slice) % NUM_SEGMENTS;

  // Animate spin
  const duration = 4000 + Math.random() * 2000;
  const startTime = Date.now();
  const startAngle = currentAngle;

  function animSpin(){
    const elapsed = Date.now() - startTime;
    const progress = Math.min(1, elapsed / duration);

    // Ease out cubic
    const ease = 1 - Math.pow(1 - progress, 3);
    const angle = startAngle + (targetRotation - startAngle) * ease;

    document.getElementById('wheel').style.transform = `rotate(${angle}deg)`;

    // Tick sounds during spin
    const prevSegment = Math.floor(((currentAngle % 360) / slice));
    const currSegment = Math.floor(((angle % 360) / slice));
    if(prevSegment !== currSegment) playTickSound();

    currentAngle = angle;

    if(progress < 1){
      requestAnimationFrame(animSpin);
    } else {
      currentAngle = targetRotation;
      spinning = false;
      revealFortune(fortuneIdx);
    }
  }
  requestAnimationFrame(animSpin);
}

  }, 600);
}

// ── Sound ─────────────────────────────────────
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(f,t,v,d,delay){
  try{
    const c=getAudio(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type=t;o.frequency.value=f;delay=delay||0;
    g.gain.setValueAtTime(0,c.currentTime+delay);
    g.gain.linearRampToValueAtTime(v,c.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+d);
    o.start(c.currentTime+delay);o.stop(c.currentTime+delay+d+0.05);
  }catch(e){}
}
function playTickSound(){
  playTone(800+Math.random()*400,'sine',0.08,0.04);
}
function playSpinSound(){
  playTone(200,'sawtooth',0.1,0.3);
  playTone(300,'sine',0.08,0.2,0.1);
}
function playRevealSound(){
  [392,523,659,784,1047].forEach((f,i)=>
    playTone(f,'sine',0.4,0.3,i*0.1)
  );
}

// Checks names/locations for inappropriate content
// Returns {ok:true} or {ok:false, msg:"reason"}
function filterInput(text){
  if(!text||text.trim().length===0) return {ok:true};
  const t = text.toLowerCase().replace(/[^a-z0-9\s]/g,'');
  const words = t.split(/\s+/);

  // Bad words list (partial — catches roots)
  const BAD = [
    'fuck','shit','ass','bitch','cunt','dick','cock','pussy','bastard',
    'whore','slut','nigger','nigga','faggot','retard','rape','pedo',
    'porn','sex','naked','nude','boob','tit','butt','anus','penis',
    'vagina','dildo','boner','horny','cum','jizz','anal','xxx',
    'drugs','meth','cocaine','heroin','weed','kike','spic','chink',
    'cracker','tranny','crap','piss','damn','hell','idiot','moron',
    'stupid','loser','hate','kill','murder','suicide','terrorist',
    'jihad','nazi','racist','slavery'
  ];

  // Political / divisive names to block
  const POLITICAL = [
    'trump','biden','obama','clinton','hillary','harris','desantis',
    'pelosi','maga','democrat','republican','liberal','conservative',
    'socialist','communist','fascist','antifa','kkk','proud boys',
    'blm','qanon','isis','taliban','putin','kim jong','xi jinping',
    'zelensky','netanyahu','aoc','bernie','elon','musk','soros',
    'rothschild','illuminati'
  ];

  // Check each word
  for(const w of words){
    for(const bad of BAD){
      if(w.includes(bad)) return {ok:false, msg:'Please keep it family-friendly! 🌺'};
    }
    for(const pol of POLITICAL){
      if(t.includes(pol)) return {ok:false, msg:'Please keep names neutral — no politics here! 🌺'};
    }
  }
  // Max length check
  if(text.trim().length > 25) return {ok:false, msg:'Please keep it under 25 characters! 🌺'};
  return {ok:true};
}

function checkInputs(nameId, locId){
  const name = document.getElementById(nameId)?.value.trim()||'';
  const loc  = document.getElementById(locId)?.value.trim()||'';
  const nCheck = filterInput(name);
  const lCheck = filterInput(loc);
  if(!nCheck.ok) return {ok:false, msg:'Name: '+nCheck.msg};
  if(!lCheck.ok) return {ok:false, msg:'Location: '+lCheck.msg};
  return {ok:true};
}
