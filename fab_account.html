<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — fab.games</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--black:#070708;--gold:#c9a84c;--gold2:#e8c96a;--white:#f0efe8;--muted:rgba(240,239,232,0.5);--border:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(201,168,76,0.05),transparent);pointer-events:none;}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
.nav-back{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;}
.nav-back:hover{color:var(--gold);}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{width:100%;max-width:440px;background:#0d0d0f;border:1px solid rgba(201,168,76,0.15);border-radius:4px;padding:40px 36px;box-shadow:0 0 60px rgba(201,168,76,0.06);}
.card-icon{font-size:48px;text-align:center;margin-bottom:8px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;text-align:center;margin-bottom:4px;}
.card-title em{font-style:italic;color:var(--gold);}
.card-email{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px;}
.status-box{border-radius:2px;padding:18px;margin-bottom:20px;text-align:center;}
.status-box.active{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);}
.status-box.cancelled{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);}
.status-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.status-box.active .status-label{color:rgba(34,197,94,0.7);}
.status-box.cancelled .status-label{color:rgba(239,68,68,0.7);}
.status-value{font-size:18px;font-weight:600;font-family:'Cormorant Garamond',serif;}
.status-box.active .status-value{color:#22c55e;}
.status-box.cancelled .status-value{color:#fca5a5;}
.status-sub{font-size:12px;color:var(--muted);margin-top:4px;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:2px;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-align:center;text-decoration:none;transition:all 0.2s;margin-bottom:10px;font-family:'Inter',sans-serif;}
.btn-gold{background:linear-gradient(135deg,var(--gold),#a87d2a);color:#000;box-shadow:0 0 30px rgba(201,168,76,0.2);}
.btn-gold:hover{background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 0 50px rgba(201,168,76,0.4);}
.btn-ghost{background:rgba(255,255,255,0.04);color:var(--white);border:1px solid rgba(255,255,255,0.08);}
.btn-ghost:hover{border-color:rgba(201,168,76,0.3);}
.btn-danger{background:rgba(239,68,68,0.06);color:#fca5a5;border:1px solid rgba(239,68,68,0.2);}
.btn-danger:hover{background:rgba(239,68,68,0.12);}
.loading{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
footer{text-align:center;padding:20px;font-size:11px;color:rgba(240,239,232,0.2);}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">fab.games</a>
  <a href="/" class="nav-back">← Back to Games</a>
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-icon">👤</div>
    <div class="card-title">My <em>Account</em></div>
    <div class="card-email" id="userEmail">Loading...</div>

    <div id="content">
      <div class="loading">Loading your membership details...</div>
    </div>
  </div>
</div>
<footer>© 2026 fab.games — Made with 🌺 in Hawaii</footer>

<script>
let sbClient;
async function init(){
  const res = await fetch('/api/config');
  const config = await res.json();
  sbClient = window.supabase.createClient(config.supabase_url, config.supabase_anon_key);

  const{data:{session}}=await sbClient.auth.getSession();
  if(!session){ window.location.href='/login'; return; }

  document.getElementById('userEmail').textContent=session.user.email;

  const{data:m}=await sbClient.from('members')
    .select('*')
    .eq('email',session.user.email)
    .single();

  renderStatus(m, session.user.email);
}

function renderStatus(m, email){
  const el=document.getElementById('content');
  const status = m?.status || 'trial';
  const cancelled = status==='cancelled' || status==='cancel_at_period_end';

  let trialEndStr = '';
  if(m?.trial_end){
    const d=new Date(m.trial_end);
    trialEndStr = d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  }

  if(cancelled){
    el.innerHTML=`
      <div class="status-box cancelled">
        <div class="status-label">Subscription Cancelled</div>
        <div class="status-value">We'll miss you</div>
        <div class="status-sub">${trialEndStr ? `You can keep playing until <strong>${trialEndStr}</strong>` : 'Access ends at your current billing period'}</div>
      </div>
      <a href="#" onclick="openPortal();return false;" class="btn btn-gold">Resume My Subscription</a>
      <a href="/play" class="btn btn-ghost">Keep Playing</a>
      <a href="#" onclick="logout();return false;" class="btn btn-ghost">Sign Out</a>
    `;
  } else {
    el.innerHTML=`
      <div class="status-box active">
        <div class="status-label">Membership Status</div>
        <div class="status-value">Active</div>
        <div class="status-sub">${trialEndStr ? `Free trial until <strong>${trialEndStr}</strong>` : 'Enjoying full access'}</div>
      </div>
      <a href="/play" class="btn btn-gold">Play Games</a>
      <a href="#" onclick="openPortal();return false;" class="btn btn-ghost">Manage Billing & Payment</a>
      <a href="#" onclick="cancelMembership();return false;" class="btn btn-danger">Cancel Membership</a>
      <a href="#" onclick="logout();return false;" class="btn btn-ghost">Sign Out</a>
    `;
  }
}

async function openPortal(){
  const{data:{session}}=await sbClient.auth.getSession();
  const res=await fetch('/api/create-portal-session',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:session.user.email})
  });
  const data=await res.json();
  if(data.ok && data.url){ window.location.href=data.url; }
  else { alert('Unable to open billing portal: '+(data.error||'unknown error')); }
}

async function cancelMembership(){
  if(!confirm('Are you sure you want to cancel? You can resume anytime before your access ends.')) return;
  await openPortal();
}

async function logout(){
  await sbClient.auth.signOut();
  window.location.href='/';
}

init();
</script>
</body>
</html>
