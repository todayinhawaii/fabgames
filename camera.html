<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📷 Vintage Hawaii Camera — Today in Hawaii</title>
<meta name="description" content="Transform your photos into stunning vintage Hawaii film looks. 34 authentic film filters inspired by Hawaii's golden eras.">
<link rel="icon" href="/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;600;700&family=Courier+Prime:ital@0;1&display=swap');

:root{
  --gold:#d4a843;--cream:#f5edd6;--dark:#0d0a06;
  --brown:#3d2b1f;--film:#c8a97a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  background:var(--dark);
  font-family:'DM Sans',sans-serif;
  color:var(--cream);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── FILM STRIP TOP ── */
.filmstrip{
  width:100%;height:32px;
  background:#111;
  border-bottom:2px solid #333;
  display:flex;align-items:center;
  overflow:hidden;position:relative;
  flex-shrink:0;
}
.filmstrip-holes{
  display:flex;gap:0;width:200%;
  animation:filmroll 3s linear infinite;
}
@keyframes filmroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.hole{
  width:20px;height:20px;border-radius:3px;
  background:var(--dark);border:2px solid #444;
  margin:0 8px;flex-shrink:0;
}

/* ── HEADER ── */
.header{
  text-align:center;padding:16px 20px 12px;
  border-bottom:1px solid rgba(212,168,67,0.2);
  background:linear-gradient(180deg,#1a1208,#0d0a06);
}
.header-badge{
  font-size:10px;font-family:'Courier Prime',monospace;
  color:var(--gold);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:4px;
}
.header-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,5vw,34px);font-weight:900;
  background:linear-gradient(135deg,#f5edd6,#d4a843,#f5edd6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 8px rgba(212,168,67,0.4));
  line-height:1.1;
}
.header-sub{
  font-size:12px;color:rgba(245,237,214,0.5);
  margin-top:4px;font-style:italic;
}

/* ── MAIN LAYOUT ── */
.app{
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
  height:calc(100vh - 32px);
  position:relative;
}

/* ── VIEWFINDER ── */
.viewfinder-wrap{
  position:relative;flex:1;min-height:0;
  background:#000;overflow:hidden;
}
video,canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
}
#preview{
  z-index:1;
  background:#000;
}
#overlay-canvas{
  z-index:2;
  pointer-events:none;
}
#overlay-canvas{
  z-index:2;
  pointer-events:none;
}

/* Camera overlay decorations */
.vf-corner{
  position:absolute;z-index:5;
  width:28px;height:28px;pointer-events:none;
}
.vf-corner.tl{top:12px;left:12px;
  border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
.vf-corner.tr{top:12px;right:12px;
  border-top:2px solid var(--gold);border-right:2px solid var(--gold);}
.vf-corner.bl{bottom:12px;left:12px;
  border-bottom:2px solid var(--gold);border-left:2px solid var(--gold);}
.vf-corner.br{bottom:12px;right:12px;
  border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);}

.filter-name-badge{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  z-index:6;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(6px);
  border:1px solid rgba(212,168,67,0.4);
  border-radius:99px;
  padding:4px 14px;
  font-family:'Courier Prime',monospace;
  font-size:11px;color:var(--gold);
  letter-spacing:1px;
  white-space:nowrap;
}

.era-badge{
  position:absolute;bottom:14px;left:14px;z-index:6;
  font-family:'Courier Prime',monospace;
  font-size:10px;color:rgba(245,237,214,0.6);
  letter-spacing:2px;text-transform:uppercase;
}

/* ── SHUTTER BUTTON ── */
.shutter-wrap{
  position:absolute;bottom:18px;right:18px;z-index:8;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.shutter-btn{
  width:68px;height:68px;border-radius:50%;
  border:4px solid var(--gold);
  background:radial-gradient(circle,#fff 40%,#e8e8e8 100%);
  cursor:pointer;position:relative;
  box-shadow:0 0 0 3px rgba(212,168,67,0.3),
             0 0 20px rgba(212,168,67,0.4),
             0 4px 12px rgba(0,0,0,0.5);
  transition:all 0.1s;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.shutter-btn:active{transform:scale(0.93);box-shadow:0 0 30px rgba(212,168,67,0.8);}
.flip-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}

/* Flash effect */
.flash-overlay{
  position:absolute;inset:0;z-index:20;
  background:white;opacity:0;pointer-events:none;
  transition:opacity 0.05s;
}
.flash-overlay.flash{opacity:0.9;}

/* ── FILTER PANEL ── */
.filter-panel{
  background:#100d08;
  border-top:1px solid rgba(212,168,67,0.2);
  height:200px;
  flex-shrink:0;
}
.era-tabs{
  display:flex;overflow-x:auto;
  border-bottom:1px solid rgba(212,168,67,0.15);
  scrollbar-width:none;
  padding:0 4px;
}
.era-tabs::-webkit-scrollbar{display:none;}
.era-tab{
  flex-shrink:0;padding:10px 18px;
  font-size:13px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:rgba(245,237,214,0.4);
  border-bottom:2px solid transparent;cursor:pointer;
  white-space:nowrap;transition:all 0.2s;
  font-family:'Courier Prime',monospace;
}
.era-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.filters-scroll{
  display:flex;gap:10px;overflow-x:auto;
  padding:12px 12px;height:210px;
  scrollbar-width:none;align-items:center;
}
.filters-scroll::-webkit-scrollbar{display:none;}

.filter-card{
  flex-shrink:0;width:144px;
  background:rgba(255,255,255,0.04);
  border:1.5px solid rgba(212,168,67,0.15);
  border-radius:10px;overflow:hidden;cursor:pointer;
  transition:all 0.2s;position:relative;
  height:180px;display:flex;flex-direction:column;
}
.filter-card:active{transform:scale(0.96);}
.filter-card.selected{
  border-color:var(--gold);
  box-shadow:0 0 16px rgba(212,168,67,0.5);
}
.filter-thumb{
  height:100px;width:100%;flex-shrink:0;overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;background:#0a0a0a;
}
.filter-thumb canvas{
  width:100%;height:100%;
  position:static;object-fit:cover;
}
.filter-info{
  padding:6px 8px;flex:1;
  display:flex;flex-direction:column;justify-content:center;
}
.filter-fname{
  font-size:8.5px;font-weight:700;color:var(--cream);
  line-height:1.2;-webkit-font-smoothing:antialiased;
}
.filter-fdate{
  font-size:7.5px;color:var(--gold);
  font-family:'Courier Prime',monospace;
  margin-top:1px;
}

/* ── CAPTURED PHOTO MODAL ── */
.photo-modal{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.95);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:20px;
}
.photo-modal.show{display:flex;}
.photo-modal img{
  max-width:100%;max-height:65vh;
  border-radius:4px;
  box-shadow:0 0 40px rgba(212,168,67,0.3),0 20px 60px rgba(0,0,0,0.8);
  border:2px solid rgba(212,168,67,0.3);
}
.photo-label{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:18px;color:var(--gold);text-align:center;
}
.photo-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.photo-btn{
  padding:13px 28px;border:none;border-radius:99px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:0.5px;
  transition:all 0.12s;
}
.photo-btn.save{
  background:linear-gradient(135deg,var(--gold),#b8860b);
  color:#000;
  box-shadow:0 4px 0 #7a5c08,0 0 20px rgba(212,168,67,0.4);
}
.photo-btn.save:active{transform:translateY(3px);box-shadow:0 1px 0 #7a5c08;}
.photo-btn.close{
  background:rgba(255,255,255,0.08);color:var(--cream);
  border:1px solid rgba(255,255,255,0.15);
}

/* ── NO CAMERA ── */
.no-camera{
  position:absolute;inset:0;z-index:3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;text-align:center;padding:20px;
  background:radial-gradient(ellipse,#1a1208,#000);
}
.no-camera-btn{
  padding:14px 32px;border:none;border-radius:99px;
  background:linear-gradient(135deg,var(--gold),#b8860b);
  color:#000;font-size:15px;font-weight:800;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:1px;
  box-shadow:0 6px 0 #7a5c08,0 0 20px rgba(212,168,67,0.4);
  transition:all 0.1s;
}
.no-camera-btn:active{transform:translateY(4px);}

/* ── GAMES HUB LINK ── */
.hub-link{
  position:absolute;top:14px;left:14px;z-index:7;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
  border:1px solid rgba(212,168,67,0.3);

  font-size:10px;font-weight:700;color:var(--gold);
  text-decoration:none;letter-spacing:1px;
  text-transform:uppercase;font-family:'Courier Prime',monospace;
}
</style>

function drawThumb(era,i,f){
  const c=document.getElementById(`thumb-${era.replace(/[^a-z0-9]/gi,'')}-${i}`);
  if(!c) return;
  const cx=c.getContext('2d');
  // Simple gradient placeholder showing filter colour mood
  const grad=cx.createLinearGradient(0,0,96,66);
  const col=getFilterColour(f);
  grad.addColorStop(0,col[0]);
  grad.addColorStop(1,col[1]);
  cx.fillStyle=grad;
  cx.fillRect(0,0,96,66);
  // Apply CSS filter for preview
  c.style.filter=f.css;
  // Vignette
  const vg=cx.createRadialGradient(48,33,10,48,33,55);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,`rgba(0,0,0,${f.vignette*0.7})`);
  cx.fillStyle=vg;
  cx.fillRect(0,0,96,66);
  // Filter name
  cx.font='bold 7px system-ui';
  cx.fillStyle='rgba(255,255,255,0.85)';
  cx.textAlign='center';
  cx.fillText(f.name.substring(0,14),48,36);
}

function getFilterColour(f){
  if(f.css.includes('grayscale')) return ['#888','#333'];
  if(f.css.includes('sepia(0.8')||f.css.includes('sepia(0.7')||f.css.includes('sepia(0.6')) return ['#c8a97a','#7a5c38'];
  if(f.css.includes('hue-rotate(200')) return ['#1a3a6a','#6a1a5a'];
  if(f.css.includes('hue-rotate(330')) return ['#8a4a6a','#4a2a5a'];
  if(f.css.includes('hue-rotate(15')) return ['#cc6622','#882211'];
  if(f.name.includes('Neon')) return ['#1a0a3a','#3a1a5a'];
  if(f.name.includes('Sunset')||f.name.includes('Glow')) return ['#cc4411','#882200'];
  if(f.name.includes('Maui')||f.name.includes('North')||f.name.includes('Pacific')) return ['#0a3a5a','#1a6a8a'];
  return ['#1a3a1a','#2a5a3a'];
}

// ── CAMERA ────────────────────────────────────────────────
async function startCamera(){
  try{
    if(stream){ stream.getTracks().forEach(t=>t.stop()); }
    // Front camera: avoid strict size constraints that can fail on mobile
    const videoConstraints = facingMode==='user'
      ? {facingMode:{ideal:'user'}}
      : {facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080}};
    stream = await navigator.mediaDevices.getUserMedia({
      video: videoConstraints,
      audio:false
    });
    video.srcObject=stream;
    // Mirror front camera
    video.style.transform = facingMode==='user' ? 'scaleX(-1)' : 'scaleX(1)';
    // Explicitly play - required on mobile browsers!
    try{ await video.play(); }catch(e){}

    // Android Chrome fix: force repaint after play
    // Without this, video stays black until page loses/gains focus
    video.style.opacity='0.99';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        video.style.opacity='1';
      });
    });

    video.onloadedmetadata=()=>{
      document.getElementById('noCamera').style.display='none';
      video.style.display='block';
      canvas.style.display='block';
      // Force another repaint when metadata loads
      video.style.transform=facingMode==='user'?'scaleX(-1)':'scaleX(1)';
      resizeCanvas();
      startRender();
    };
  }catch(e){
    alert('Camera access needed! Please allow camera in your browser settings. 📷');
  }
}

function resizeCanvas(){
  const wrap=document.getElementById('viewfinderWrap');
  canvas.width=wrap.offsetWidth;
  canvas.height=wrap.offsetHeight;
}
window.addEventListener('resize',resizeCanvas);

async function flipCamera(){
  facingMode = facingMode==='environment'?'user':'environment';
  await startCamera();
}

// ── REAL-TIME RENDER LOOP ─────────────────────────────────
function startRender(){
  if(rafId) cancelAnimationFrame(rafId);
  function render(){
    if(video.readyState>=2){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      applyGrain(selectedFilter.grain);
      applyVignette(selectedFilter.vignette);
      if(selectedFilter.warm!==0) applyWarmTint(selectedFilter.warm);
    }
    rafId=requestAnimationFrame(render);
  }
  // Fire when first real video frame arrives
  video.addEventListener('loadeddata', ()=>{
    video.style.opacity='0.99';
    setTimeout(()=>{ video.style.opacity='1'; },50);
  }, {once:true});

  render();
  // Apply CSS filter to video element
  applyVideoFilter();
}

function applyVideoFilter(){
  video.style.filter=selectedFilter.css;
}

// Watch for filter changes
let lastFilter=null;
function checkFilterChange(){
  if(selectedFilter!==lastFilter){
    lastFilter=selectedFilter;
    applyVideoFilter();
  }
  setTimeout(checkFilterChange,100);
}
checkFilterChange();

function applyGrain(intensity){
  if(intensity<=0) return;
  const imageData=ctx.createImageData(canvas.width,canvas.height);
  const data=imageData.data;
  for(let i=0;i<data.length;i+=4){
    const noise=(Math.random()-0.5)*intensity*255;
    data[i]=data[i+1]=data[i+2]=128+noise;
    data[i+3]=Math.floor(intensity*60);
  }
  ctx.putImageData(imageData,0,0);
}

function applyVignette(strength){
  if(strength<=0) return;
  const grad=ctx.createRadialGradient(
    canvas.width/2,canvas.height/2,canvas.height*0.25,
    canvas.width/2,canvas.height/2,canvas.height*0.8
  );
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,`rgba(0,0,0,${strength*0.7})`);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function applyWarmTint(warm){
  ctx.fillStyle=warm>0
    ?`rgba(${warm*3},${warm*1.5},0,0.06)`
    :`rgba(0,${Math.abs(warm)*1.5},${Math.abs(warm)*3},0.06)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ── CAPTURE PHOTO ─────────────────────────────────────────
async function capturePhoto(){
  const flash=document.getElementById('flashOverlay');
  flash.classList.add('flash');
  setTimeout(()=>flash.classList.remove('flash'),150);
  dbg('🔴 CAPTURE START','#f0f');

  try{
    const w=video.videoWidth||1280;
    const h=video.videoHeight||720;
    dbg('📐 '+w+'x'+h+' ready:'+video.readyState,'#0ff');

    // ── METHOD A: ImageCapture.takePhoto() ──────────────
    // Captures direct from hardware - bypasses canvas taint!
    if(window.ImageCapture && stream){
      try{
        const track=stream.getVideoTracks()[0];
        const ic=new ImageCapture(track);
        dbg('📸 Trying takePhoto()...','#ff0');
        const blob=await ic.takePhoto();
        dbg('✅ takePhoto blob: '+blob.size+' bytes','#0f0');

        // Convert blob to data URL
        const reader=new FileReader();
        const dataUrl=await new Promise((res,rej)=>{
          reader.onload=()=>res(reader.result);
          reader.onerror=rej;
          reader.readAsDataURL(blob);
        });

        // Apply CSS filter effect by drawing to canvas with filter
        const cap=document.createElement('canvas');
        const img=new Image();
        await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src=dataUrl;});
        cap.width=img.width; cap.height=img.height;
        const cctx=cap.getContext('2d',{willReadFrequently:true});
        cctx.filter=selectedFilter.css||'none';
        if(facingMode==='user'){
          cctx.save();cctx.scale(-1,1);
          cctx.drawImage(img,-cap.width,0,cap.width,cap.height);
          cctx.restore();
        } else {
          cctx.drawImage(img,0,0);
        }
        cctx.filter='none';
        // Vignette
        if(selectedFilter.vignette>0){
          const vg=cctx.createRadialGradient(cap.width/2,cap.height/2,cap.height*0.2,cap.width/2,cap.height/2,cap.height*0.8);
          vg.addColorStop(0,'rgba(0,0,0,0)');
          vg.addColorStop(1,`rgba(0,0,0,${selectedFilter.vignette*0.75})`);
          cctx.fillStyle=vg;cctx.fillRect(0,0,cap.width,cap.height);
        }
        // Stamp
        cctx.font=`bold ${Math.floor(cap.width*0.025)}px Courier New`;
        cctx.fillStyle='rgba(255,255,255,0.65)';
        cctx.textAlign='left';
        cctx.fillText('📷 '+selectedFilter.name+' — fab.games',cap.width*0.02,cap.height*0.97);

        capturedDataURL=cap.toDataURL('image/jpeg',0.92);
        dbg('✅ Photo ready! '+Math.round(capturedDataURL.length/1024)+'KB','#0f0');
        showPhoto();
        return;
      }catch(e){ dbg('❌ takePhoto: '+e.message,'#f44'); }
    }

    // ── METHOD B: createImageBitmap → OffscreenCanvas ───
    // createImageBitmap works (confirmed r105 g98 b87)
    // Use OffscreenCanvas to avoid taint on main canvas
    if(window.createImageBitmap && window.OffscreenCanvas){
      try{
        dbg('🔄 Trying OffscreenCanvas...','#ff0');
        const bitmap=await createImageBitmap(video);
        const oc=new OffscreenCanvas(w,h);
        const octx=oc.getContext('2d');
        octx.filter=selectedFilter.css||'none';
        if(facingMode==='user'){
          octx.save();octx.scale(-1,1);octx.drawImage(bitmap,-w,0,w,h);octx.restore();
        } else { octx.drawImage(bitmap,0,0,w,h); }
        octx.filter='none';
        bitmap.close&&bitmap.close();
        const blob=await oc.convertToBlob({type:'image/jpeg',quality:0.92});
        const url=URL.createObjectURL(blob);
        capturedDataURL=url;
        dbg('✅ OffscreenCanvas worked!','#0f0');
        showPhoto();
        return;
      }catch(e){ dbg('❌ OffscreenCanvas: '+e.message,'#f44'); }
    }

    // ── METHOD C: createImageBitmap → img → canvas ─────
    if(window.createImageBitmap){
      try{
        dbg('🔄 Trying bitmap→img→canvas...','#ff0');
        const bitmap=await createImageBitmap(video);
        const cap=document.createElement('canvas');
        cap.width=w;cap.height=h;
        const cctx=cap.getContext('2d',{willReadFrequently:true});
        cctx.fillStyle='#000';cctx.fillRect(0,0,w,h);
        cctx.filter=selectedFilter.css||'none';
        if(facingMode==='user'){
          cctx.save();cctx.scale(-1,1);cctx.drawImage(bitmap,-w,0,w,h);cctx.restore();
        } else { cctx.drawImage(bitmap,0,0,w,h); }
        cctx.filter='none';
        bitmap.close&&bitmap.close();
        if(selectedFilter.vignette>0){
          const vg=cctx.createRadialGradient(w/2,h/2,h*0.2,w/2,h/2,h*0.8);
          vg.addColorStop(0,'rgba(0,0,0,0)');
          vg.addColorStop(1,`rgba(0,0,0,${selectedFilter.vignette*0.75})`);
          cctx.fillStyle=vg;cctx.fillRect(0,0,w,h);
        }
        capturedDataURL=cap.toDataURL('image/jpeg',0.92);
        dbg('Method C result len:'+capturedDataURL.length,'#fa0');
        showPhoto();
        return;
      }catch(e){ dbg('❌ Method C: '+e.message,'#f44'); }
    }

    dbg('❌ ALL METHODS FAILED','#f00');
    alert('Camera capture not supported on this browser. Try updating Chrome!');

  }catch(err){
    dbg('💥 OUTER ERROR: '+err.message,'#f44');
    alert('Error: '+err.message);
  }
}

function showPhoto(){
  document.getElementById('capturedImg').src=capturedDataURL;
  document.getElementById('photoLabel').textContent='📷 '+selectedFilter.name;
  document.getElementById('photoModal').classList.add('show');
  playShutter();
}


// ── SHUTTER SOUND ─────────────────────────────────
function playShutter(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    // Click sound
    const buf=ac.createBuffer(1,ac.sampleRate*0.1,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ac.sampleRate*0.02));
    const src=ac.createBufferSource();
    src.buffer=buf;
    const g=ac.createGain();
    g.gain.setValueAtTime(0.3,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
    src.connect(g);g.connect(ac.destination);
    src.start();
  }catch(e){}
}

// ── ON-SCREEN DEBUG ───────────────────────────────
let debugVisible=false;
function toggleDebug(){
  debugVisible=!debugVisible;
  document.getElementById('debugPanel').style.display=debugVisible?'block':'none';
}
function dbg(msg,color='#0f0'){
  const log=document.getElementById('debugLog');
  if(!log)return;
  const line=document.createElement('div');
  line.style.color=color;
  line.textContent=new Date().toLocaleTimeString()+' '+msg;
  log.appendChild(line);
  log.scrollTop=log.scrollHeight;
  console.log(msg);
}
