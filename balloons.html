<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🎈 Pop That Balloon! — Today in Hawaii</title>
  <meta name="description" content="Pop colorful balloons for points! Vegas ASMR balloon popping — all ages!">
  <link rel="icon" href="/icon-192.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

    body{
      min-height:100vh;
      font-family:system-ui,sans-serif;
      overflow:hidden;
      user-select:none;-webkit-user-select:none;
      background:#0a0015;
    }

    /* Vegas rainbow animated background */
    #vbg{
      position:fixed;inset:0;z-index:0;
      background:linear-gradient(160deg,#0a0015,#1a0030,#0a0015);
      overflow:hidden;
    }
    .vbg-ray{
      position:absolute;
      top:50%;left:50%;
      width:200%;height:8px;
      transform-origin:0% 50%;
      border-radius:4px;
      opacity:0.15;
      animation:rayRotate linear infinite;
    }
    @keyframes rayRotate{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

    /* Neon glow orbs */
    .glow-orb{
      position:absolute;
      border-radius:50%;
      filter:blur(60px);
      opacity:0.2;
      animation:orbPulse ease-in-out infinite alternate;
    }
    @keyframes orbPulse{0%{transform:scale(1);opacity:0.15;}100%{transform:scale(1.3);opacity:0.28;}}

    /* Sparkles */
    .sparkle{
      position:fixed;
      pointer-events:none;
      z-index:1;
      animation:sparkleTwinkle ease-in-out infinite;
      font-size:14px;
    }
    @keyframes sparkleTwinkle{
      0%,100%{opacity:0;transform:scale(0.5);}
      50%{opacity:1;transform:scale(1.2);}
    }

    /* Game canvas */
    #gameCanvas{
      position:fixed;inset:0;
      pointer-events:none;
      z-index:10;
      overflow:hidden;
    }
    #gameCanvas.active{pointer-events:all;}

    /* HUD */
    #hud{
      position:fixed;top:0;left:0;right:0;
      padding:8px 16px 10px;z-index:50;
      display:flex;align-items:center;justify-content:space-between;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      min-height:70px;
    }
    /* Vegas Slot Machine Score */
    #slotScore{
      display:flex;flex-direction:column;align-items:flex-start;gap:2px;
    }
    .slot-label{
      font-size:9px;font-weight:900;letter-spacing:0.15em;
      color:#ffd700;text-transform:uppercase;
      text-shadow:0 0 8px rgba(255,215,0,0.6);
      margin-left:3px;
    }
    .slot-machine{
      position:relative;
      background:linear-gradient(180deg,#1a0030,#0a0015,#1a0030);
      border:2px solid #ffd700;
      border-radius:8px;
      padding:0 10px;
      min-width:100px;
      box-shadow:
        0 0 12px rgba(255,215,0,0.5),
        0 0 24px rgba(255,215,0,0.2),
        inset 0 2px 4px rgba(0,0,0,0.8),
        inset 0 -1px 2px rgba(255,215,0,0.2);
      overflow:hidden;
    }
    .slot-window{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:6px 0;
    }
    .slot-digit{
      font-size:26px;font-weight:900;
      font-family:'Courier New',monospace;
      background:linear-gradient(180deg,#ffe566,#ffd700,#ff8c00);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      letter-spacing:2px;
      min-width:90px;
      text-align:center;
      line-height:normal;
      display:block;
      filter:drop-shadow(0 0 6px rgba(255,215,0,0.8));
    }
    .slot-digit.flash{
      animation:digitFlash 0.15s ease-in-out;
    }
    @keyframes digitFlash{
      0%,100%{transform:scaleY(1);opacity:1;}
      50%{transform:scaleY(0.1);opacity:0.3;}
    }
    /* Shine overlay on slot machine */
    .slot-shine{
      position:absolute;top:0;left:0;right:0;height:40%;
      background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent);
      border-radius:6px 6px 0 0;
      pointer-events:none;
    }
    /* Slot machine side bolts */
    .slot-machine::before,.slot-machine::after{
      content:'●';
      position:absolute;
      font-size:6px;color:#ffd700;
      top:50%;transform:translateY(-50%);
      opacity:0.6;
    }
    .slot-machine::before{left:3px;}
    .slot-machine::after{right:3px;}
    .hud-mid{text-align:center;font-size:12px;font-weight:700;color:#e8f4f8;}
    .hud-timer{
      font-size:24px;font-weight:900;color:#22d3ee;
      min-width:44px;text-align:right;
    }
    .hud-timer.urgent{
      color:#ff4444!important;-webkit-text-fill-color:#ff4444!important;
      animation:timerPanic 0.4s ease-in-out infinite;
    }
    @keyframes timerPanic{0%,100%{transform:scale(1);}50%{transform:scale(1.5);text-shadow:0 0 20px #ff0000;}}

    /* Timer bar */
    #timerBar{
      position:fixed;top:80px;left:0;right:0;
      height:5px;background:rgba(255,255,255,0.06);z-index:50;
    }
    #timerFill{
      height:100%;
      background:linear-gradient(90deg,#ff0080,#ff8c00,#ffd700,#00ff80,#00d4ff,#a040ff);
      background-size:200% auto;
      animation:rainbowShift 2s linear infinite;
      transition:width 0.1s linear;
    }
    @keyframes rainbowShift{0%{background-position:0% center;}100%{background-position:200% center;}}

    /* Balloon */
    .balloon{
      position:absolute;
      cursor:pointer;
      pointer-events:all;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
    .balloon:active{transform:scale(0.85)!important;}
    .balloon-pts{
      position:absolute;
      top:42%;left:50%;
      transform:translate(-50%,-50%);
      font-weight:900;color:#fff;
      text-shadow:0 1px 4px rgba(0,0,0,0.7),0 0 8px rgba(0,0,0,0.5);
      pointer-events:none;z-index:2;
      white-space:nowrap;text-align:center;
      line-height:1.2;
    }

    /* Pop ring */
    .pop-ring{
      position:fixed;border-radius:50%;
      border:5px solid transparent;
      pointer-events:none;z-index:999;
      animation:popRing 0.45s ease forwards;
    }
    @keyframes popRing{
      0%{transform:translate(-50%,-50%) scale(0.2);opacity:1;}
      100%{transform:translate(-50%,-50%) scale(2.8);opacity:0;}
    }

    /* Score popup */
    .score-pop{
      position:fixed;font-weight:900;
      pointer-events:none;z-index:9999;
      animation:scoreFly 1s ease forwards;
      transform:translate(-50%,-50%);
    }
    @keyframes scoreFly{
      0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
      100%{opacity:0;transform:translate(-50%,-130%) scale(1.6);}
    }

    /* Name screen */
    #nameScreen{
      position:fixed;inset:0;z-index:300;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
    }
    .ns-card{
      background:linear-gradient(135deg,rgba(20,0,40,0.95),rgba(10,0,25,0.98));
      border:2px solid rgba(255,255,255,0.12);
      border-radius:28px;padding:28px 24px;
      max-width:360px;width:90%;
      box-shadow:0 0 40px rgba(160,64,255,0.3),0 20px 60px rgba(0,0,0,0.6);
      text-align:center;
    }
    .ns-logo{font-size:60px;margin-bottom:8px;animation:logoBob 2s ease-in-out infinite;}
    @keyframes logoBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
    .ns-title{
      font-size:26px;font-weight:900;margin-bottom:4px;
      background:linear-gradient(135deg,#ff0080,#ff8c00,#ffd700,#00ff80,#00d4ff,#a040ff);
      background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:rainbowShift 2s linear infinite;
    }
    .ns-sub{font-size:13px;color:#a78bfa;margin-bottom:20px;line-height:1.5;}

    /* Color score preview in name screen */
    .ns-balloons{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:18px;}
    .ns-balloon-chip{
      padding:4px 10px;border-radius:99px;
      font-size:11px;font-weight:700;color:#fff;
    }

    .ns-input{
      width:100%;padding:12px;
      background:rgba(255,255,255,0.07);
      border:1.5px solid rgba(255,255,255,0.15);
      border-radius:12px;color:#e8f4f8;
      font-size:15px;font-family:inherit;
      outline:none;margin-bottom:10px;text-align:center;
    }
    .ns-input::placeholder{color:#7fb3c8;}
    .ns-select{
      width:100%;padding:12px;
      background:rgba(10,0,25,0.8);
      border:1.5px solid rgba(255,255,255,0.15);
      border-radius:12px;color:#e8f4f8;
      font-size:14px;font-family:inherit;
      outline:none;margin-bottom:16px;cursor:pointer;
    }
    .ns-btn{
      width:100%;padding:16px;border:none;border-radius:14px;
      font-size:16px;font-weight:900;cursor:pointer;
      font-family:inherit;letter-spacing:1px;color:#fff;
      background:linear-gradient(135deg,#ff0080,#ff8c00,#ffd700);
      background-size:200% auto;
      animation:rainbowShift 2s linear infinite;
      box-shadow:0 8px 24px rgba(255,0,128,0.4);
      transition:transform 0.15s;
    }
    .ns-btn:disabled{opacity:0.35;cursor:not-allowed;animation:none;}
    .ns-btn:active:not(:disabled){transform:scale(0.97);}

    /* Results */
    #resultsOverlay{
      position:fixed;inset:0;display:none;
      align-items:center;justify-content:center;
      z-index:400;background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);
    }
    #resultsOverlay.show{display:flex;}
    .res-card{
      background:linear-gradient(135deg,#140028,#0a0015);
      border:2px solid rgba(255,255,255,0.1);
      border-radius:28px;padding:24px 20px;
      max-width:360px;width:90%;
      box-shadow:0 0 40px rgba(160,64,255,0.2),0 20px 60px rgba(0,0,0,0.7);
      text-align:center;max-height:90vh;overflow-y:auto;
    }
    .res-emoji{font-size:60px;margin-bottom:8px;}
    .res-title{font-size:22px;font-weight:900;color:#ffd700;margin-bottom:6px;}
    .res-score{
      font-size:48px;font-weight:900;margin:8px 0;
      background:linear-gradient(135deg,#ffd700,#ff0080);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .res-msg{font-size:13px;color:#a78bfa;line-height:1.6;margin-bottom:16px;}
    .lb-row{
      display:flex;align-items:center;gap:8px;
      padding:7px 10px;border-radius:10px;
      font-size:12px;margin-bottom:4px;
      background:rgba(255,255,255,0.05);color:#e8f4f8;
    }
    .lb-row.r1{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.2);}
    .lb-row.r2{background:rgba(192,192,192,0.08);}
    .lb-row.r3{background:rgba(205,127,50,0.08);}
    .lb-row.me{background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);}
    .lb-medal{font-size:16px;width:22px;}
    .lb-name{flex:1;font-weight:700;text-align:left;font-size:12px;}
    .lb-pts{font-weight:900;color:#ffd700;}
    .res-btn{
      width:100%;padding:13px;border:none;border-radius:13px;
      font-size:14px;font-weight:800;cursor:pointer;
      font-family:inherit;margin-bottom:8px;color:#fff;transition:transform 0.1s;
    }
    .res-btn:active{transform:scale(0.97);}
    .res-btn-play{background:linear-gradient(135deg,#ff0080,#ff8c00,#ffd700);background-size:200% auto;animation:rainbowShift 2s linear infinite;}
    .res-btn-share{background:linear-gradient(135deg,#1877f2,#0d65d9);}
    .res-btn-home{background:rgba(255,255,255,0.08);}

    /* Confetti */
    .confetti{position:fixed;pointer-events:none;z-index:9998;}

    .mute-btn{
      position:fixed;bottom:16px;right:16px;
      width:42px;height:42px;border-radius:50%;
      background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);
      font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      z-index:100;color:white;
    }

    .back-btn{
      position:fixed;bottom:16px;left:16px;
      padding:8px 16px;border-radius:99px;
      background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.12);
      font-size:12px;font-weight:700;color:#a78bfa;
      cursor:pointer;z-index:100;text-decoration:none;
    }
  
    .signup-form{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;align-items:center;}
    .signup-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.07);
      border:2px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;
      font-size:14px;font-family:system-ui,sans-serif;outline:none;text-align:center;
      transition:border-color 0.2s;}
    .signup-input:focus{border-color:rgba(255,255,255,0.6);}
    .signup-input::placeholder{color:rgba(255,255,255,0.35);}
    .signup-label{font-size:9px;font-weight:900;text-transform:uppercase;
      letter-spacing:0.12em;color:rgba(255,255,255,0.5);
      margin-bottom:-6px;align-self:flex-start;padding-left:4px;}
    </style>
</head>
<body>

<!-- Vegas background -->
<div id="vbg">
  <!-- Rainbow rays -->
  <div class="vbg-ray" style="background:linear-gradient(90deg,transparent,#ff0080,transparent);animation-duration:8s;"></div>
  <div class="vbg-ray" style="background:linear-gradient(90deg,transparent,#ff8c00,transparent);animation-duration:12s;animation-delay:-3s;"></div>
  <div class="vbg-ray" style="background:linear-gradient(90deg,transparent,#ffd700,transparent);animation-duration:10s;animation-delay:-6s;"></div>
  <div class="vbg-ray" style="background:linear-gradient(90deg,transparent,#00ff80,transparent);animation-duration:9s;animation-delay:-1s;"></div>
  <div class="vbg-ray" style="background:linear-gradient(90deg,transparent,#00d4ff,transparent);animation-duration:11s;animation-delay:-4s;"></div>
  <div class="vbg-ray" style="background:linear-gradient(90deg,transparent,#a040ff,transparent);animation-duration:13s;animation-delay:-7s;"></div>
  <!-- Glow orbs -->
  <div class="glow-orb" style="width:500px;height:500px;top:-100px;left:-100px;background:#ff0080;animation-duration:4s;"></div>
  <div class="glow-orb" style="width:400px;height:400px;bottom:-80px;right:-80px;background:#a040ff;animation-duration:5s;animation-delay:-2s;"></div>
  <div class="glow-orb" style="width:300px;height:300px;top:40%;left:40%;background:#ffd700;animation-duration:6s;animation-delay:-1s;"></div>
</div>

<!-- HUD -->
<div id="hud" style="display:none;">
  <!-- Vegas Slot Machine Score -->
  <div id="slotScore">
    <div class="slot-label">🎈 SCORE</div>
    <div class="slot-machine">
      <div class="slot-window">
        <div class="slot-digit" id="slotCurrent">0</div>
      </div>
      <div class="slot-shine"></div>
    </div>
  </div>
  <div class="hud-mid">
    <div id="timerLabel" style="font-size:11px;color:#a78bfa;"></div>
    <div id="poppedDisplay" style="font-size:11px;color:#7fb3c8;"></div>
  </div>
  <div class="hud-timer" id="timerDisplay">60</div>
</div>
<div id="timerBar" style="display:none;"><div id="timerFill" style="width:100%"></div></div>

<!-- Game Canvas -->
<div id="gameCanvas"></div>

<!-- Name Screen -->
<div id="nameScreen">
  <div class="ns-card">
    <div class="ns-logo">🎈</div>
    <div class="ns-title">Pop That Balloon!!</div>
    <div class="ns-sub">All colors float in at once! Rare balloons score more — pop them fast! ASMR satisfying pops for all ages 🌺</div>

    <!-- Color preview chips -->
    <div class="ns-balloons" id="previewChips"></div>

    
    <div class="signup-form">
            <span class="signup-label">Your Full Name</span>
            <input class="signup-input" id="playerName"
              placeholder="e.g. Sarah Johnson" maxlength="30"
              onkeydown="if(event.key==='Enter')document.getElementById('playerUser').focus()">
            <span class="signup-label">Choose a Username</span>
            <input class="signup-input" id="playerUser"
              placeholder="e.g. SurfQueen808" maxlength="20"
              onkeydown="if(event.key==='Enter')document.getElementById('playerLoc').focus()">
            <span class="signup-label">Country, City or Island 🌺</span>
            <input class="signup-input" id="playerLoc"
              placeholder="e.g. Maui, Hawaii" maxlength="30"
              onkeydown="if(event.key==='Enter')beginGame()">
          </div>
          <button class="ns-btn" id="startBtn" onclick="startGame()" disabled>🎈 POP 'EM ALL!</button>
  </div>
</div>

<!-- Results -->
<div id="resultsOverlay">
  <div class="res-card">
    <div class="res-emoji" id="resEmoji">🎈</div>
    <div class="res-title" id="resTitle">Game Over!</div>
    <div class="res-score" id="resScore">0</div>
    <div class="res-msg" id="resMsg"></div>
    <div id="lbList" style="margin-bottom:14px;"></div>
    <button class="res-btn res-btn-share" onclick="shareScore()">📘 Challenge Friends!</button>
    <button class="res-btn res-btn-play" onclick="playAgain()">🎈 Play Again!</button>
    <button class="res-btn res-btn-home" onclick="window.location='/play'">← Play Room</button>
  </div>
</div>

<button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
<a class="back-btn" href="/play">← Games</a>

<script>
// ══════════════════════════════════════════════════
// ALOHA BALLOONS — Vegas Rainbow ASMR Popper
// Today in Hawaii © 2026
// All colors float in at once — rare = more points!
// ══════════════════════════════════════════════════

// Balloon types — sorted by points (common to rare)
// spawnRate = how often they appear (higher = more common)
const BALLOONS = [
  {id:'pink',   hex:'#FF69B4',shine:'#FFD6EC',dark:'#C2185B',pts:10, spawnRate:20,label:'Pink'},
  {id:'blue',   hex:'#4FC3F7',shine:'#B3E5FC',dark:'#0277BD',pts:15, spawnRate:18,label:'Blue'},
  {id:'green',  hex:'#66BB6A',shine:'#C8E6C9',dark:'#2E7D32',pts:20, spawnRate:16,label:'Green'},
  {id:'yellow', hex:'#FFD54F',shine:'#FFF9C4',dark:'#F9A825',pts:25, spawnRate:14,label:'Yellow'},
  {id:'orange', hex:'#FFA726',shine:'#FFE0B2',dark:'#E65100',pts:35, spawnRate:10,label:'Orange'},
  {id:'purple', hex:'#CE93D8',shine:'#F3E5F5',dark:'#7B1FA2',pts:50, spawnRate:8, label:'Purple'},
  {id:'red',    hex:'#EF5350',shine:'#FFCDD2',dark:'#B71C1C',pts:75, spawnRate:5, label:'Red'},
  {id:'gold',   hex:'#FFD700',shine:'#FFFDE7',dark:'#F57F00',pts:100,spawnRate:3, label:'Gold ⭐'},
  {id:'rainbow',hex:'#fff',   shine:'#fff',   dark:'#9C27B0',pts:200,spawnRate:1, label:'Rainbow 🌈'},
];

// Build weighted spawn pool from spawnRate
const SPAWN_POOL = [];
BALLOONS.forEach(b=>{for(let i=0;i<b.spawnRate;i++) SPAWN_POOL.push(b);});

const GAME_TIME = 60; // 1 minute of chaos!
let playerName='',playerLoc='';
let score=0,totalPopped=0,bestPop=0;
let timeLeft=GAME_TIME,timerInterval=null,spawnInterval=null;
let activeBalloons=[],gameActive=false,muted=false,myRank=0;

// ── Build preview chips ────────────────────────
function buildPreview(){
  const el=document.getElementById('previewChips');
  BALLOONS.forEach(b=>{
    const chip=document.createElement('div');
    chip.className='ns-balloon-chip';
    chip.style.background=b.id==='rainbow'
      ?'linear-gradient(135deg,#ff0080,#ffd700,#00ff80,#00d4ff,#a040ff)'
      :b.hex;
    chip.style.color=b.pts>=75?'#fff':'#000';
    chip.textContent=b.label+' +'+b.pts;
    el.appendChild(chip);
  });
}
buildPreview();

// ── Legend ──────────────────────────────────────

// ── Name Entry ─────────────────────────────────
document.getElementById('playerName').addEventListener('input', checkReady);
document.getElementById('playerLoc').addEventListener('input', checkReady);
function checkReady(){
  const ok = (document.getElementById('playerName')?.value.trim().length > 0) && (document.getElementById('playerLoc')?.value.trim().length > 0);
  document.getElementById('startBtn').disabled=!ok;
}

function startGame(){
  // Content filter — block bad words and politics
  const _fc = checkInputs('playerName', 'playerLoc');
  if(!_fc.ok){
    const _fi = document.getElementById('playerName');
    if(_fi){ _fi.style.borderColor='#ff4444'; _fi.style.boxShadow='0 0 10px rgba(255,0,0,0.4)'; }
    // Show error message
    const _fe = document.getElementById('filterError') || (()=>{
      const d=document.createElement('div');
      d.id='filterError';
      d.style.cssText='color:#ff6666;font-size:12px;font-weight:700;text-align:center;margin-top:-8px;';
      const btn=document.querySelector('.ov-btn');
      if(btn&&btn.parentNode)btn.parentNode.insertBefore(d,btn);
      return d;
    })();
    _fe.textContent='⚠️ '+_fc.msg;
    setTimeout(()=>{if(_fi){_fi.style.borderColor='';_fi.style.boxShadow='';}if(_fe)_fe.textContent='';},3000);
    return;
  }
  playerName=document.getElementById('playerName').value.trim();
  playerLoc=document.getElementById('playerLoc').value;
  document.getElementById('nameScreen').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('timerBar').style.display='block';

  score=0;totalPopped=0;bestPop=0;timeLeft=GAME_TIME;
  updateHUD();
  loadLeaderboard();
  beginGame();
}

function beginGame(){
  gameActive=true;
  document.getElementById('gameCanvas').classList.add('active');

  // Spawn burst to start!
  for(let i=0;i<8;i++) setTimeout(()=>spawnBalloon(),i*200);

  // Keep spawning continuously
  spawnInterval=setInterval(()=>{
    if(!gameActive) return;
    if(activeBalloons.length<18) spawnBalloon();
    // Occasionally spawn 2 at once for excitement
    if(Math.random()<0.3&&activeBalloons.length<15) spawnBalloon();
  },800);

  // Timer
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft-=0.1;
    updateTimerBar();
    if(timeLeft<=0){clearInterval(timerInterval);gameOver();}
  },100);
}

// ── Balloon Spawning ────────────────────────────
function spawnBalloon(){
  if(!gameActive) return;

  // Pick random balloon type from weighted pool
  const type=SPAWN_POOL[Math.floor(Math.random()*SPAWN_POOL.length)];
  const canvas=document.getElementById('gameCanvas');
  const W=window.innerWidth,H=window.innerHeight;

  // Size based on rarity — rare ones slightly bigger for drama!
  const baseSize=type.pts>=200?160:type.pts>=100?150:type.pts>=75?140:type.pts>=50?130:type.pts>=35?120:100+Math.random()*20;
  const size=baseSize;

  // Random entry side
  const side=Math.floor(Math.random()*4);
  let startX,startY,endX,endY;

  if(side===0){startX=Math.random()*(W-size);startY=-size-20;endX=startX+(Math.random()-0.5)*W*0.4;endY=H+size+20;}
  else if(side===1){startX=W+size+20;startY=Math.random()*(H-size);endX=-size-20;endY=startY+(Math.random()-0.5)*H*0.4;}
  else if(side===2){startX=Math.random()*(W-size);startY=H+size+20;endX=startX+(Math.random()-0.5)*W*0.4;endY=-size-20;}
  else{startX=-size-20;startY=Math.random()*(H-size);endX=W+size+20;endY=startY+(Math.random()-0.5)*H*0.4;}

  const dur=(14+Math.random()*10)*1000; // 14-24 seconds
  const wobble=(Math.random()-0.5)*25;

  const div=document.createElement('div');
  div.className='balloon';
  div.style.cssText=`left:${startX}px;top:${startY}px;width:${size}px;height:${size*1.3}px;`;
  div.innerHTML=buildBalloonSVG(size,type);

  // Points label
  const ptsEl=document.createElement('div');
  ptsEl.className='balloon-pts';
  ptsEl.style.fontSize=Math.max(12,size*0.15)+'px';
  ptsEl.innerHTML=`<div>${type.pts}</div><div style="font-size:0.7em;opacity:0.9;">pts</div>`;
  div.appendChild(ptsEl);

  // Pop events
  const doPop=e=>{e.preventDefault();e.stopPropagation();popBalloon(div,type,size);};
  div.addEventListener('click',doPop);
  div.addEventListener('touchstart',doPop,{passive:false});

  canvas.appendChild(div);
  activeBalloons.push(div);

  // Animate with requestAnimationFrame
  const start=Date.now();
  function anim(){
    if(!div.isConnected){activeBalloons=activeBalloons.filter(b=>b!==div);return;}
    const p=Math.min(1,(Date.now()-start)/dur);
    if(p>=1){div.remove();activeBalloons=activeBalloons.filter(b=>b!==div);return;}
    const ease=p; // linear
    const wob=Math.sin(p*Math.PI*7)*wobble;
    const x=startX+(endX-startX)*ease+wob;
    const y=startY+(endY-startY)*ease;
    const breathe=1+Math.sin(p*Math.PI*10)*0.025;
    div.style.left=x+'px';
    div.style.top=y+'px';
    div.style.transform=`scale(${breathe})`;
    requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

// ── Balloon SVG ────────────────────────────────
function buildBalloonSVG(size,type){
  const w=size,h=size;
  const cx=w/2,cy=h*0.44;
  const rx=w*0.43,ry=h*0.43;
  const id='b'+Math.random().toString(36).substr(2,8);
  const isRainbow=type.id==='rainbow';
  const isGold=type.id==='gold';

  let gradDef;
  if(isRainbow){
    gradDef=`<radialGradient id="${id}" cx="38%" cy="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="20%" stop-color="#FF69B4"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#66BB6A"/>
      <stop offset="80%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </radialGradient>`;
  } else if(isGold){
    gradDef=`<radialGradient id="${id}" cx="35%" cy="28%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>`;
  } else {
    gradDef=`<radialGradient id="${id}" cx="35%" cy="28%">
      <stop offset="0%" stop-color="${type.shine}" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="${type.hex}"/>
      <stop offset="100%" stop-color="${type.dark}"/>
    </radialGradient>`;
  }

  const knotY=cy+ry;
  const strPath=`M${cx},${knotY+5} Q${cx-10},${knotY+18} ${cx+6},${knotY+32} Q${cx-4},${knotY+46} ${cx},${knotY+60}`;
  const glowColor=isRainbow?'rgba(200,100,255,0.4)':isGold?'rgba(255,215,0,0.5)':`${type.hex}66`;

  return `<svg viewBox="0 0 ${w} ${h+65}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
    <defs>
      ${gradDef}
      <filter id="glow${id}">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>
    ${isGold||isRainbow?`<ellipse cx="${cx}" cy="${cy}" rx="${rx+4}" ry="${ry+4}" fill="${glowColor}" filter="url(#glow${id})"/>`:''}
    <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="url(#${id})"/>
    <ellipse cx="${cx-rx*0.24}" cy="${cy-ry*0.24}" rx="${rx*0.18}" ry="${ry*0.14}" fill="white" opacity="0.45"/>
    <ellipse cx="${cx+rx*0.18}" cy="${cy-ry*0.38}" rx="${rx*0.08}" ry="${ry*0.06}" fill="white" opacity="0.3"/>
    <polygon points="${cx-5},${knotY} ${cx+5},${knotY} ${cx},${knotY+9}" fill="${type.dark}"/>
    <path d="${strPath}" stroke="${type.dark}" stroke-width="1.8" fill="none" opacity="0.55" stroke-linecap="round"/>
  </svg>`;
}

// ── Pop! ────────────────────────────────────────
function popBalloon(div,type,size){
  if(!gameActive||!div.isConnected) return;
  activeBalloons=activeBalloons.filter(b=>b!==div);
  const rect=div.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  div.remove();

  // ASMR pop sound — pitched by rarity
  playPop(type.pts);
  vibrate(type.pts>=100?60:type.pts>=50?40:20);

  // Pop ring
  const ring=document.createElement('div');
  ring.className='pop-ring';
  ring.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;border-color:${type.hex};box-shadow:0 0 20px ${type.hex};`;
  document.body.appendChild(ring);
  setTimeout(()=>ring.remove(),460);

  // Big confetti for rare balloons!
  burst(cx,cy,type,type.pts>=75?20:type.pts>=35?12:8);

  // Score popup — bigger for rare!
  const pop=document.createElement('div');
  pop.className='score-pop';
  pop.style.cssText=`left:${cx}px;top:${cy}px;color:${type.hex};font-size:${type.pts>=100?32:type.pts>=50?26:20}px;text-shadow:0 0 12px ${type.hex};`;
  pop.textContent='+'+type.pts+'!';
  document.body.appendChild(pop);
  if(type.pts>=100) pop.textContent='🌟 +'+type.pts+'!!';
  setTimeout(()=>pop.remove(),1000);

  score+=type.pts;
  totalPopped++;
  if(type.pts>bestPop) bestPop=type.pts;
  updateHUD();
}

// ── Burst ───────────────────────────────────────
function burst(cx,cy,type,count){
  const colors=[type.hex,type.dark,type.shine,'#fff','#ffd700'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div');
    c.className='confetti';
    const sz=5+Math.random()*10;
    c.style.cssText=`
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${sz}px;height:${sz}px;
      border-radius:${Math.random()>0.5?'50%':'3px'};
      left:${cx}px;top:${cy}px;
      box-shadow:0 0 6px ${type.hex};
    `;
    document.body.appendChild(c);
    const ang=Math.random()*Math.PI*2;
    const dist=50+Math.random()*120;
    const tx=Math.cos(ang)*dist,ty=Math.sin(ang)*dist;
    const dur=500+Math.random()*500;
    const start=Date.now();
    function animC(){
      const p=Math.min(1,(Date.now()-start)/dur);
      const e=1-Math.pow(1-p,2);
      c.style.transform=`translate(calc(-50% + ${tx*e}px),calc(-50% + ${ty*e+80*p*p}px)) rotate(${p*600}deg)`;
      c.style.opacity=1-p;
      if(p<1) requestAnimationFrame(animC);
      else c.remove();
    }
    requestAnimationFrame(animC);
  }
}

// ── HUD ─────────────────────────────────────────
let displayedScore=0;

function updateHUD(){
  document.getElementById('timerLabel').textContent='⏱️ Pop them all — 60 seconds!';
  document.getElementById('poppedDisplay').textContent=
    '💥 '+totalPopped+' popped · Best: '+bestPop+' pts';
  animateSlot(score);
}

function animateSlot(newScore){
  if(newScore===displayedScore) return;
  const el=document.getElementById('slotCurrent');
  const machine=document.querySelector('.slot-machine');
  const diff=newScore-displayedScore;
  const spins=Math.min(8,Math.max(2,Math.floor(diff/10)));
  let spinCount=0;
  let current=displayedScore;

  function doSpin(){
    if(spinCount>=spins){
      el.textContent=newScore.toLocaleString();
      displayedScore=newScore;
      // Final gold flash
      machine.style.boxShadow='0 0 30px rgba(255,215,0,0.9),0 0 60px rgba(255,215,0,0.5),inset 0 2px 4px rgba(0,0,0,0.8)';
      setTimeout(()=>{
        machine.style.boxShadow='0 0 12px rgba(255,215,0,0.5),0 0 24px rgba(255,215,0,0.2),inset 0 2px 4px rgba(0,0,0,0.8)';
      },250);
      return;
    }
    // Intermediate value
    current=Math.round(displayedScore+(newScore-displayedScore)*(spinCount+1)/spins);
    // Flash animation — digit squishes then shows new number
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
    setTimeout(()=>{
      el.textContent=current.toLocaleString();
      spinCount++;
      setTimeout(doSpin,70);
    },75);
  }
  doSpin();
}

function updateTimerBar(){
  const pct=Math.max(0,(timeLeft/GAME_TIME)*100);
  document.getElementById('timerFill').style.width=pct+'%';
  const t=Math.ceil(timeLeft);
  const el=document.getElementById('timerDisplay');
  el.textContent=t;
  if(t<=10){el.classList.add('urgent');}
  else{el.classList.remove('urgent');}
  if(t<=10&&t>0) vibrate(8);
}

// ── Game Over ────────────────────────────────────
function gameOver(){
  gameActive=false;
  clearInterval(spawnInterval);
  // Pop all remaining balloons with fanfare!
  [...activeBalloons].forEach((b,i)=>{
    setTimeout(()=>{
      if(!b.isConnected) return;
      const r=b.getBoundingClientRect();
      burst(r.left+r.width/2,r.top+r.height/2,BALLOONS[Math.floor(Math.random()*BALLOONS.length)],6);
      b.remove();
    },i*50);
  });
  activeBalloons=[];
  setTimeout(()=>showResults(),1200);
}

async function showResults(){
  await submitScore();
  await loadLeaderboard();
  const msgs=[
    'You\'re a balloon popping LEGEND!! 🎈🏆',
    'So satisfying!! Come back and beat your score! 🌺',
    'Mahalo for playing — aloha vibes! 🤙',
    'Did you catch any Gold or Rainbow? Those score BIG! ⭐🌈',
  ];
  document.getElementById('resEmoji').textContent=score>2000?'🏆':score>1000?'🎈':'🌺';
  document.getElementById('resTitle').textContent=
    score>2000?'BALLOON CHAMPION!!':score>1000?'Amazing Popper!':'Great Job!';
  document.getElementById('resScore').textContent=score.toLocaleString()+' pts';
  document.getElementById('resMsg').textContent=
    '💥 Popped '+totalPopped+' balloons! Best single pop: '+bestPop+' pts! '+
    msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('resultsOverlay').classList.add('show');
}

function playAgain(){
  document.getElementById('resultsOverlay').classList.remove('show');
  score=0;totalPopped=0;bestPop=0;timeLeft=GAME_TIME;
  updateHUD();updateTimerBar();
  document.getElementById('gameCanvas').innerHTML='';
  activeBalloons=[];
  beginGame();
}

function shareScore(){
  const txt='🎈 I popped '+totalPopped+' balloons and scored '+score.toLocaleString()+' pts on Pop That Balloon! from '+playerLoc+'! Can you beat me? 🌺 fab.games/balloons';
  window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent('/balloons')+'&quote='+encodeURIComponent(txt),'_blank');

// ── ASMR Pop Sound ────────────────────────────────
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playPop(pts){
  if(muted) return;
  try{
    const c=getAudio();
    const buf=c.createBuffer(1,c.sampleRate*0.2,c.sampleRate);
    const d=buf.getChannelData(0);
    const baseFreq=150+pts*1.5+Math.random()*40;
    for(let i=0;i<d.length;i++){
      const t=i/c.sampleRate;
      const env=Math.exp(-t*(pts>=100?20:pts>=50?28:38));
      const env2=Math.exp(-t*100);
      d[i]=env*(Math.sin(2*Math.PI*baseFreq*t)*0.75+
                Math.sin(2*Math.PI*baseFreq*2.3*t)*0.15)+
           env2*(Math.random()*2-1)*0.45;
    }
    const src=c.createBufferSource();
    const gain=c.createGain();
    src.connect(gain);gain.connect(c.destination);
    src.buffer=buf;
    gain.gain.value=pts>=100?0.9:0.7;
    src.start();
  }catch(e){}
}
function toggleMute(){muted=!muted;document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';}
function vibrate(ms){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(e){}}

// ── Sparkles on background ─────────────────────
for(let i=0;i<20;i++){
  const s=document.createElement('div');
  s.className='sparkle';
  s.textContent=['✨','⭐','💫','🌟'][Math.floor(Math.random()*4)];
  s.style.cssText=`top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*3}s;z-index:1;pointer-events:none;`;
  document.getElementById('vbg').appendChild(s);
}

// ── Leaderboard ────────────────────────────────
async function loadLeaderboard(){
  try{
    const res=await fetch('/api/balloon-scores');
    const data=await res.json();
    const medals=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
    if(!data.length){
      document.getElementById('lbList').innerHTML='<div style="text-align:center;color:#7fb3c8;font-size:13px;padding:10px;">Be the first balloon champion! 🎈</div>';
      return;
    }
    document.getElementById('lbList').innerHTML=data.slice(0,6).map((s,i)=>{
      const isMe=playerName&&s.name.toLowerCase()===playerName.toLowerCase();
      const cls=i===0?'r1':i===1?'r2':i===2?'r3':isMe?'me':'';
      return `<div class="lb-row ${cls}">
        <span class="lb-medal">${medals[i]||i+1}</span>
        <div style="flex:1">
          <div class="lb-name">${s.name}${isMe?' ← You!':''}</div>
          <div style="font-size:10px;color:#7fb3c8;">📍 ${s.island} · 💥 ${s.level} popped</div>
        </div>
        <span class="lb-pts">${Number(s.score).toLocaleString()}</span>
      </div>`;
    }).join('');
  }catch(e){}
}
async function submitScore(){
  if(!playerName||score<=0) return;
  try{
    const res=await fetch('/api/balloon-scores',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:playerName,score,island:playerLoc,level:totalPopped})
    });
    const data=await res.json();
    if(data.ok) myRank=data.rank;
  }catch(e){}
}
loadLeaderboard();

// ── CONTENT FILTER ──────────────────────────────
// Checks names/locations for inappropriate content
// Returns {ok:true} or {ok:false, msg:"reason"}
function filterInput(text){
  if(!text||text.trim().length===0) return {ok:true};
  const t = text.toLowerCase().replace(/[^a-z0-9\s]/g,'');
  const words = t.split(/\s+/);

  // Bad words list (partial — catches roots)
  const BAD = [
    'fuck','shit','ass','bitch','cunt','dick','cock','pussy','bastard',
    'whore','slut','nigger','nigga','faggot','retard','rape','pedo',
    'porn','sex','naked','nude','boob','tit','butt','anus','penis',
    'vagina','dildo','boner','horny','cum','jizz','anal','xxx',
    'drugs','meth','cocaine','heroin','weed','kike','spic','chink',
    'cracker','tranny','crap','piss','damn','hell','idiot','moron',
    'stupid','loser','hate','kill','murder','suicide','terrorist',
    'jihad','nazi','racist','slavery'
  ];

  // Political / divisive names to block
  const POLITICAL = [
    'trump','biden','obama','clinton','hillary','harris','desantis',
    'pelosi','maga','democrat','republican','liberal','conservative',
    'socialist','communist','fascist','antifa','kkk','proud boys',
    'blm','qanon','isis','taliban','putin','kim jong','xi jinping',
    'zelensky','netanyahu','aoc','bernie','elon','musk','soros',
    'rothschild','illuminati'
  ];

  // Check each word
  for(const w of words){
    for(const bad of BAD){
      if(w.includes(bad)) return {ok:false, msg:'Please keep it family-friendly! 🌺'};
    }
    for(const pol of POLITICAL){
      if(t.includes(pol)) return {ok:false, msg:'Please keep names neutral — no politics here! 🌺'};
    }
  }
  // Max length check
  if(text.trim().length > 25) return {ok:false, msg:'Please keep it under 25 characters! 🌺'};
  return {ok:true};
}

function checkInputs(nameId, locId){
  const name = document.getElementById(nameId)?.value.trim()||'';
  const loc  = document.getElementById(locId)?.value.trim()||'';
  const nCheck = filterInput(name);
  const lCheck = filterInput(loc);
  if(!nCheck.ok) return {ok:false, msg:'Name: '+nCheck.msg};
  if(!lCheck.ok) return {ok:false, msg:'Location: '+lCheck.msg};
  return {ok:true};
}
