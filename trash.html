<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pick Up The Trash! 🧹</title>
<style>
:root{
  --ink:#1a2e1a;
  --cream:#fdf6e8;
  --leaf:#4a8c3f;
  --leaf2:#6fb35c;
  --gold:#ffd34d;
  --sun:#ff9d4d;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Baloo 2','Comic Sans MS',system-ui,sans-serif;
  background:#0c1f12;
  touch-action:none;
}
#app{position:fixed;inset:0;}

/* ───────── CANVAS ───────── */
#gameCanvas{position:absolute;inset:0;display:block;}

/* ───────── HUD ───────── */
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px;z-index:30;pointer-events:none;
  font-weight:800;color:#fff;
  text-shadow:0 2px 6px rgba(0,0,0,0.35);
}
#hud{justify-content:center;gap:18px;}
@keyframes pillPop{0%{transform:scale(1);}40%{transform:scale(1.25) rotate(-3deg);}100%{transform:scale(1);}}
@keyframes bannerGlow{0%{box-shadow:0 0 0 3px rgba(255,211,77,0.2),0 4px 16px rgba(0,0,0,0.5),0 0 20px rgba(160,32,240,0.5);}100%{box-shadow:0 0 0 4px rgba(255,211,77,0.5),0 4px 20px rgba(0,0,0,0.5),0 0 40px rgba(160,32,240,0.8);}}
.hud-pill.pop{animation:pillPop 0.35s ease;}
.hud-pill{
  background:linear-gradient(135deg,#2a0845,#6a1b9a 50%,#2a0845);
  border:2.5px solid var(--gold);
  border-radius:40px;
  padding:10px 26px;
  font-size:20px;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 0 0 3px rgba(255,211,77,0.18), 0 4px 16px rgba(0,0,0,0.4), inset 0 2px 8px rgba(255,255,255,0.15);
  text-shadow:0 0 8px rgba(255,211,77,0.6), 0 2px 4px rgba(0,0,0,0.5);
  letter-spacing:1px;
}
#trashCount,#scoreCount{
  color:var(--gold);font-weight:900;font-size:24px;
  text-shadow:0 0 10px rgba(255,211,77,0.9), 0 2px 4px rgba(0,0,0,0.5);
}

/* ───────── OVERLAY SCREENS ───────── */
.overlay{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;
  background:linear-gradient(160deg,#2f6b34 0%,#1b3d1f 100%);
  transition:opacity 0.4s ease, transform 0.4s ease;
}
.overlay.hidden{opacity:0;pointer-events:none;transform:scale(1.04);}
.overlay.beach-bg{background:linear-gradient(160deg,#3fb6c9 0%,#1b6b80 100%);}

.title{
  font-size:clamp(34px,9vw,54px);
  font-weight:900;color:#fff;
  text-shadow:0 4px 0 rgba(0,0,0,0.18);
  margin-bottom:4px;letter-spacing:1px;
}
.title span{display:inline-block;animation:wiggle 1.6s ease-in-out infinite;}
.title span:nth-child(2){animation-delay:0.1s;}
.title span:nth-child(3){animation-delay:0.2s;}
@keyframes wiggle{0%,100%{transform:rotate(0deg) translateY(0);}50%{transform:rotate(-6deg) translateY(-4px);}}

.subtitle{
  font-size:clamp(13px,3.6vw,16px);
  color:rgba(255,255,255,0.85);
  margin-bottom:28px;font-weight:600;
  letter-spacing:0.5px;
}

.section-label{
  font-size:12px;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);font-weight:800;margin-bottom:14px;
}

/* Character grid */
.char-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;
  margin-bottom:30px;max-width:340px;width:100%;
}
.char-card{
  background:rgba(255,255,255,0.1);
  border:3px solid rgba(255,255,255,0.18);
  border-radius:20px;padding:18px 8px 12px;
  cursor:pointer;transition:all 0.18s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.char-card .emoji{font-size:48px;line-height:1;transition:transform 0.18s;}
.char-card .char-img{height:64px;width:auto;object-fit:contain;transition:transform 0.18s;filter:drop-shadow(0 3px 4px rgba(0,0,0,0.25));}
.char-card .name{font-size:13px;font-weight:800;color:#fff;}
.char-card:active{transform:scale(0.95);}
.char-card.selected{
  border-color:var(--gold);
  background:rgba(255,211,77,0.18);
  box-shadow:0 0 0 4px rgba(255,211,77,0.25), 0 8px 20px rgba(0,0,0,0.25);
}
.char-card.selected .emoji{transform:scale(1.15) rotate(-6deg);}
.char-card.selected .char-img{transform:scale(1.15) rotate(-6deg);}

/* Scene grid */
.scene-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:16px;
  margin-bottom:30px;max-width:380px;width:100%;
}
.scene-card{
  position:relative;border-radius:22px;overflow:hidden;
  border:3px solid rgba(255,255,255,0.2);
  cursor:pointer;transition:all 0.2s;aspect-ratio:1/1.05;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;
}
.scene-card:active{transform:scale(0.96);}
.scene-card.park{background:linear-gradient(160deg,#7fc66b,#3f7a35);}
.scene-card.beach{background:linear-gradient(160deg,#ffe08a,#3fb6c9);}
.scene-card .big-emoji{font-size:46px;}
.scene-card .scene-name{font-size:15px;font-weight:900;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,0.25);}
.scene-card .scene-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,0.85);}

/* Buttons */
.btn{
  font-family:inherit;font-weight:900;font-size:17px;letter-spacing:0.5px;
  padding:16px 44px;border-radius:50px;border:none;cursor:pointer;
  color:#1a2e1a;background:linear-gradient(135deg,var(--gold),#ffb84d);
  box-shadow:0 6px 0 #b87a1f, 0 10px 24px rgba(0,0,0,0.25);
  transition:all 0.12s;
}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b87a1f;}
.btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:0 6px 0 rgba(0,0,0,0.15);}
.btn.ghost{
  background:rgba(255,255,255,0.12);color:#fff;
  box-shadow:0 6px 0 rgba(0,0,0,0.18);
  margin-top:12px;font-size:14px;padding:13px 32px;
}
.btn.ghost:active{box-shadow:0 2px 0 rgba(0,0,0,0.18);}

/* Win overlay */
#winEmoji{font-size:72px;margin-bottom:6px;animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{transform:scale(0) rotate(-30deg);}100%{transform:scale(1) rotate(0deg);}}
#winScore{
  font-size:clamp(40px,11vw,64px);font-weight:900;color:var(--gold);
  text-shadow:0 4px 0 rgba(0,0,0,0.2);margin-bottom:6px;
}
#winSub{color:rgba(255,255,255,0.85);font-size:14px;font-weight:700;margin-bottom:26px;}

/* Drag hint */
#dragHint{
  position:fixed;bottom:30px;left:0;right:0;
  text-align:center;color:rgba(255,255,255,0.92);
  font-weight:800;font-size:14px;letter-spacing:0.5px;
  text-shadow:0 2px 6px rgba(0,0,0,0.4);
  z-index:25;pointer-events:none;
  animation:fadeHint 3.5s ease forwards;
}
@keyframes fadeHint{0%{opacity:1;}70%{opacity:1;}100%{opacity:0;}}
#dragHint .pulse{
  display:inline-block;font-size:26px;
  animation:pulseHand 1.2s ease-in-out infinite;
}
@keyframes pulseHand{0%,100%{transform:scale(1);}50%{transform:scale(1.3) translateY(4px);}}

/* small floating score popups */
.fly{
  position:absolute;font-weight:900;font-size:22px;color:var(--gold);
  text-shadow:0 2px 4px rgba(0,0,0,0.35);
  pointer-events:none;z-index:40;
  animation:flyUp 0.9s ease-out forwards;
}
@keyframes flyUp{
  0%{opacity:1;transform:translate(-50%,0) scale(0.6);}
  20%{transform:translate(-50%,-10px) scale(1.15);}
  100%{opacity:0;transform:translate(-50%,-60px) scale(1);}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;">
      <!-- Top banner -->
      <div id="helpBanner" style="
        font-family:'Baloo 2',system-ui,sans-serif;
        font-size:clamp(15px,4vw,22px);font-weight:900;
        color:#ffd34d;letter-spacing:2px;text-transform:uppercase;
        background:linear-gradient(135deg,#6a0dad,#a020f0 50%,#6a0dad);
        border:2.5px solid #ffd34d;border-radius:40px;
        padding:8px 22px;
        box-shadow:0 0 0 3px rgba(255,211,77,0.2),0 4px 16px rgba(0,0,0,0.5),
                   0 0 20px rgba(160,32,240,0.5);
        text-shadow:0 0 10px rgba(255,211,77,0.8);
        animation:bannerGlow 2s ease-in-out infinite alternate;
      ">🧹 Help Pick Up The Trash!</div>
      <!-- Score pills row -->
      <div style="display:flex;gap:14px;align-items:center;">
        <div class="hud-pill" style="font-size:22px;">🗑️ <span id="trashCount">0</span> <span style="font-size:12px;opacity:0.8;">LEFT</span></div>
        <div class="hud-pill" style="font-size:22px;">⭐ <span id="scoreCount">0</span></div>
        <div id="changeSceneBtn" style="
          font-family:'Baloo 2',system-ui,sans-serif;
          font-size:13px;font-weight:900;letter-spacing:1px;
          color:#1a1a1a;cursor:pointer;
          background:linear-gradient(135deg,#ffd34d,#ffb84d);
          border:none;border-radius:30px;padding:10px 18px;
          box-shadow:0 4px 0 #b87a1f,0 6px 14px rgba(0,0,0,0.3);
          pointer-events:auto;
        ">🔄 CHANGE</div>
      </div>
    </div>
  </div>

  <div id="dragHint" style="display:none;"><span class="pulse">👆</span> Press &amp; drag to move!</div>

  <!-- CHARACTER SELECT -->
  <div class="overlay" id="charScreen">
    <div class="title"><span>P</span><span>i</span><span>c</span>k Up The Trash!</div>
    <div class="subtitle">🌱 Clean it up, feel good, repeat 🌱</div>
    <div class="section-label">Choose Your Hero</div>
    <div class="char-grid" id="charGrid"></div>
    <button class="btn" id="toSceneBtn">Next →</button>
  </div>

  <!-- SCENE SELECT -->
  <div class="overlay hidden" id="sceneScreen">
    <div class="title" style="font-size:clamp(28px,7vw,42px);">Pick a Scene</div>
    <div class="subtitle">Where should <span id="charNameLabel">Kai</span> clean today?</div>
    <div class="scene-grid">
      <div class="scene-card park" data-scene="park">
        <div class="big-emoji">🌳</div>
        <div class="scene-name">The Park</div>
        <div class="scene-sub">12 pieces of litter</div>
      </div>
      <div class="scene-card beach" data-scene="beach">
        <div class="big-emoji">🏖️</div>
        <div class="scene-name">The Beach</div>
        <div class="scene-sub">12 pieces of litter</div>
      </div>
    </div>
    <button class="btn ghost" id="backToCharBtn">← Change Hero</button>
  </div>

  <!-- WIN SCREEN -->
  <div class="overlay hidden" id="winScreen">
    <div id="winEmoji">🎉</div>
    <div class="title" style="font-size:clamp(26px,7vw,40px);">All Clean!!</div>
    <div id="winScore">0</div>
    <div id="winSub">points earned</div>
    <button class="btn" id="playAgainBtn">Clean Again 🔁</button>
    <button class="btn ghost" id="otherSceneBtn">Try Other Scene →</button>
  </div>
</div>

const TRASH_TYPES_BEACH=['🥤','🧃','🥤','🧃','🍾','🍶','🥃','🧴','🩴','🍦','📄','🗞️','📃','🥫','🛍️','🥤'];

// ── AUDIO ─────────────────────────────────────────
let actx=null;
function ensureAudio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }
function tone(freq,dur,type='sine',gain=0.18,delay=0){
  if(!actx) return;
  const t0=actx.currentTime+delay;
  const osc=actx.createOscillator();
  const g=actx.createGain();
  osc.type=type;osc.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(gain,t0);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  osc.connect(g);g.connect(actx.destination);
  osc.start(t0);osc.stop(t0+dur);
}
function sndPickup(){
  tone(1046,0.10,'square',0.14);
  tone(1318,0.10,'square',0.12,0.03);
  tone(1568,0.14,'sine',0.16,0.05);
}
function sndDump(){
  tone(260,0.18,'triangle',0.2);
  tone(140,0.22,'sine',0.16,0.05);
}
function sndCelebrate(){
  [523,659,784,1046].forEach((f,i)=>tone(f,0.22,'triangle',0.14,i*0.07));
}
function sndWin(){
  [523,659,784,1046,1318].forEach((f,i)=>tone(f,0.3,'triangle',0.15,i*0.09));
}

// ── CANVAS SETUP ──────────────────────────────────
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize',resize);
resize();

// ── GAME STATE ────────────────────────────────────
let player={x:0,y:0,vx:0,vy:0,target:null,facing:1,bob:0,carrying:[]};
// Kite (park) and sailboat (beach) state
let kite={t:0,x:0,y:0}; // t = time counter for path
let sailboat={x:-200,y:0,speed:0.7};
let trashItems=[];
let cans=[];
let particles=[];
let flyEls=[];
let running=false;
let cleanedCount=0;
let totalTrash=0;

function rand(a,b){return a+Math.random()*(b-a);}

// Normalized (0-1) positions matched to the artwork's bins & open ground
const SCENE_LAYOUT={
  park:{
    cans:[
      {x:0.18,y:0.40,color:'#3b7dd8'},
      {x:0.82,y:0.50,color:'#3fae5c'},
      {x:0.55,y:0.85,color:'#8a52d6'},
    ],
  },
  beach:{
    cans:[
      {x:0.20,y:0.46,color:'#3b7dd8'},
      {x:0.80,y:0.42,color:'#3fae5c'},
      {x:0.55,y:0.88,color:'#8a52d6'},
    ],
  }
};

function setupScene(scene){
  currentScene=scene;
  player.x=W/2;player.y=H*0.5;player.target=null;player.carrying=[];
  trashItems=[];cans=[];particles=[];
  const types = scene==='park'?TRASH_TYPES_PARK:TRASH_TYPES_BEACH;
  const layout = SCENE_LAYOUT[scene];

  layout.cans.forEach(p=>cans.push({x:p.x*W,y:p.y*H,r:86,color:p.color}));

  // Dense random scatter across the open ground, avoiding cans + overlap
  const yMin = scene==='park' ? H*0.30 : H*0.32;
  const yMax = H*0.97;
  const target = scene==='beach' ? 42 : 34;
  let tries=0;
  while(trashItems.length<target && tries<800){
    tries++;
    const x=rand(W*0.05,W*0.95);
    const y=rand(yMin,yMax);
    let ok=true;
    for(const c of cans){ if(Math.hypot(x-c.x,y-c.y)<c.r*1.5){ok=false;break;} }
    for(const t of trashItems){ if(Math.hypot(x-t.x,y-t.y)<38){ok=false;break;} }
    if(!ok) continue;
    trashItems.push({
      x,y,
      emoji:types[Math.floor(Math.random()*types.length)],
      r:38, bob:Math.random()*Math.PI*2,
      rot: rand(-0.5,0.5)
    });
  }

  totalTrash=trashItems.length;cleanedCount=0;
  score=0;
  document.getElementById('trashCount').textContent=trashItems.length;
  document.getElementById('scoreCount').textContent=score;
  // Init kite and sailboat
  kite.t=0; kite.x=W*0.5; kite.y=H*0.12;
  sailboat.x=-200; sailboat.y=H*0.28;
}

function drawBench(x,y,sc=1){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  // legs
  ctx.fillStyle='#5a3810';
  ctx.fillRect(-38,0,8,28);
  ctx.fillRect(30,0,8,28);
  ctx.fillRect(-38,12,8,28);
  ctx.fillRect(30,12,8,28);
  // support bar
  ctx.fillRect(-34,22,68,6);
  // seat slats
  ctx.fillStyle='#8b5e2a';
  ctx.fillRect(-44,-4,88,9);
  ctx.fillStyle='#a06a30';
  ctx.fillRect(-44,-4,86,7);
  // back rest slats
  ctx.fillStyle='#8b5e2a';
  ctx.fillRect(-44,-26,88,9);
  ctx.fillRect(-44,-18,88,4);
  // back legs

function drawCans(){

    // shadow
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath();ctx.ellipse(0,r*0.95,r*0.85,r*0.26,0,0,Math.PI*2);ctx.fill();
    // bin body (trapezoid)
    ctx.fillStyle=c.color;
    ctx.beginPath();
    ctx.moveTo(-r*0.75,-r*0.55);
    ctx.lineTo(r*0.75,-r*0.55);
    ctx.lineTo(r*0.62,r*0.85);
    ctx.lineTo(-r*0.62,r*0.85);
    ctx.closePath();ctx.fill();
    // lid rim
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath();ctx.ellipse(0,-r*0.55,r*0.78,r*0.16,0,0,Math.PI*2);ctx.fill();
    // opening
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();ctx.ellipse(0,-r*0.55,r*0.62,r*0.13,0,0,Math.PI*2);ctx.fill();
    // TRASH label
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.font='800 '+(r*0.32)+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.letterSpacing = (r*0.04)+'px';
    ctx.fillText('TRASH',0,r*0.05);
    ctx.letterSpacing='0px';
    // recycle symbol below label
    ctx.font=(r*0.55)+'px sans-serif';

function drawTrash(t){
  ctx.save();
  ctx.globalAlpha=1;
  const b=Math.sin(t.bob)*3;
  ctx.translate(t.x,t.y+b);
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.beginPath();ctx.ellipse(0,t.r*0.85,t.r*0.7,t.r*0.22,0,0,Math.PI*2);ctx.fill();
  ctx.rotate(t.rot||0);
  const sz=t.r*2.0;
  const sprite=getEmojiSprite(t.emoji,128);
  ctx.drawImage(sprite,-sz/2,-sz/2,sz,sz);
  ctx.restore();
}
function drawPlayer(){
  ctx.save();
  ctx.translate(player.x,player.y);

  const moving = !!player.target;
  const phase = player.bob*1.8;
  const bob = moving ? Math.abs(Math.sin(phase))*8 : Math.sin(player.bob*0.6)*2;
  const tilt = moving ? Math.sin(phase)*0.07 : Math.sin(player.bob*0.6)*0.02;
  const legSwing = moving ? Math.sin(phase)*0.45 : 0;

  // shadow
  const shadowScale = 1 - (bob/48);
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,46,38*shadowScale,11*shadowScale,0,0,Math.PI*2);ctx.fill();

  const parts = charImgEls[selectedChar.img];
  const totalH = 189; // 50% bigger overall
  const ratio = totalH / parts.h;
  const bodyDrawH = parts.bodyH * ratio;
  const legsDrawH = (parts.h - parts.bodyH + parts.overlap) * ratio;
  const wDraw = parts.w * ratio;
  const groundY = 26; // feet sit slightly below the pivot for shadow alignment

  ctx.translate(0,-bob);
  ctx.rotate(tilt);
  ctx.scale(player.facing,1);

  // body drawn first (includes head/arms), bottom edge at groundY - legsDrawH + overlap
  const bodyBottom = groundY - (legsDrawH - parts.overlap*ratio);
  if(parts.body.complete && parts.body.naturalWidth){
    // Draw full character — skew bottom half for walk animation feel
    ctx.save();
    // Subtle horizontal skew simulates leg movement while walking
    if(moving) ctx.transform(1,0, legSwing*0.25, 1, 0,0);
    ctx.drawImage(parts.body,-wDraw/2,bodyBottom-bodyDrawH,wDraw,bodyDrawH);
    ctx.restore();
  }

  ctx.restore();

  // carried items badge - follows the hand on the facing side, 100% bigger
  if(player.carrying.length>0){
    ctx.save();
    ctx.translate(player.x+38*player.facing,player.y-78+(-bob));
    const item=player.carrying[player.carrying.length-1];
    const handSprite=getEmojiSprite(item,128);
    const hsz=68;
    ctx.drawImage(handSprite,-hsz/2,-hsz/2+Math.sin(player.bob*1.5)*3,hsz,hsz);
    if(player.carrying.length>1){
      ctx.font='800 18px sans-serif';
      ctx.beginPath();ctx.arc(26*player.facing,-26,17,0,Math.PI*2);
      ctx.fillStyle='#ffd34d';ctx.fill();
      ctx.fillStyle='#1a2e1a';
      ctx.fillText('x'+player.carrying.length,26*player.facing,-25);
    }
    ctx.restore();
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.translate(p.x,p.y);
    ctx.font=p.size+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.emoji,0,0);
    ctx.restore();
  });
}

let pointerDown=false;
function setTargetFromEvent(e){
  const rect=canvas.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  player.target={x:cx,y:cy};
}
canvas.addEventListener('pointerdown',e=>{
  ensureAudio();
  pointerDown=true;setTargetFromEvent(e);
  document.getElementById('dragHint').style.display='none';
});
canvas.addEventListener('pointermove',e=>{ if(pointerDown) setTargetFromEvent(e); });
window.addEventListener('pointerup',()=>{ pointerDown=false; });
canvas.addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();pointerDown=true;setTargetFromEvent(e);document.getElementById('dragHint').style.display='none';},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(pointerDown)setTargetFromEvent(e);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();pointerDown=false;},{passive:false});


// ── EMOJI SPRITE CACHE (ensures floor trash looks identical to hand) ──
const emojiSpriteCache={};
function getEmojiSprite(emoji,size){
  const key=emoji+'_'+size;
  if(emojiSpriteCache[key]) return emojiSpriteCache[key];
  const c=document.createElement('canvas');
  c.width=size;c.height=size;
  const cx=c.getContext('2d');
  cx.font=(size*0.92)+'px sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(emoji,size/2,size/2+size*0.04);
  emojiSpriteCache[key]=c;
  return c;
}

// ── GAME LOOP ─────────────────────────────────────
const SPEED=4.4;
const PICKUP_R=46;
const DUMP_R=118;

function update(){
  player.bob+=0.12;

  // move toward target
  if(player.target){
    const dx=player.target.x-player.x;
    const dy=player.target.y-player.y;
    const dist=Math.hypot(dx,dy);
    if(dist>4){
      player.x+=(dx/dist)*SPEED;
      player.y+=(dy/dist)*SPEED;
      if(Math.abs(dx)>2) player.facing = dx<0?-1:1;
    } else {
      player.target=null;
    }
  }
  player.x=Math.max(24,Math.min(W-24,player.x));
  player.y=Math.max(H*0.13,Math.min(H-30,player.y));

  // auto pickup
  for(let i=trashItems.length-1;i>=0;i--){
    const t=trashItems[i];
    t.bob+=0.08;
    if(player.carrying.length===0 && Math.hypot(player.x-t.x,player.y-t.y)<PICKUP_R){
      player.carrying.push(t.emoji);
      burst(t.x,t.y,['✨','⭐','💥','🌟'],16);
      sndPickup();
      pulsePill('trashCount');
      trashItems.splice(i,1);
    }
  }

  // auto dump
  if(player.carrying.length>0){
    for(const c of cans){
      if(Math.hypot(player.x-c.x,player.y-c.y)<DUMP_R){
        const n=player.carrying.length;
        const pts=n*10;
        score+=pts;
        cleanedCount+=n;
        burst(c.x,c.y-10,['✨','🌟','💫','⭐'],10+n*2);
        flyScore(c.x,c.y-30,'+'+pts);
        sndDump();
        if(n>=3) sndCelebrate();
        player.carrying=[];
        document.getElementById('scoreCount').textContent=score;
        document.getElementById('trashCount').textContent=trashItems.length;
        pulsePill('scoreCount');
        break;
      }
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.life--;
    if(p.life<=0) particles.splice(i,1);
  }

  // Animate kite and sailboat
  if(currentScene==='park'){
    kite.t += 0.003;
    // Sweeping figure-8 path across the upper sky
    kite.x = W*0.5 + Math.sin(kite.t)*W*0.38;
    kite.y = H*0.10 + Math.sin(kite.t*2)*H*0.06 + Math.sin(kite.t*0.5)*H*0.04;
  } else {
    sailboat.x += sailboat.speed;
    if(sailboat.x > W+300) { sailboat.x=-200; }
  }
  // win check
  if(running && trashItems.length===0 && player.carrying.length===0){
    running=false;
    setTimeout(showWin,300);
  }
}

function drawKite(){
  const x=kite.x, y=kite.y;
  const t=kite.t;
  const sc=1.7; // 70% bigger

  // animated tail streams behind kite
  const tailColors=['#ff4444','#ff9900','#ffee00','#44cc44','#4488ff','#cc44ff'];
  // tail direction: opposite to kite movement
  const dx = -Math.cos(t)*0.6;
  const dy = -Math.sin(t*2)*0.4 + 0.7; // always hangs down a bit

  // string from kite bottom down toward ground
  ctx.save();
  ctx.strokeStyle='rgba(80,50,20,0.65)';
  ctx.lineWidth=1.8;
  ctx.beginPath();
  ctx.moveTo(x,y+28*sc);
  ctx.bezierCurveTo(
    x+30*sc, y+90*sc+Math.sin(t*3)*8,
    x+10*sc, y+150*sc+Math.sin(t*2+1)*10,
    x+60*sc, y+220*sc
  );
  ctx.stroke();

  // ribbon tail — 7 colourful streamers following kite
  for(let i=0;i<7;i++){
    ctx.strokeStyle=tailColors[i%tailColors.length];
    ctx.lineWidth=3;
    const ox = x + dx*sc*(30+i*18) + Math.sin(t*4+i*0.8)*14;
    const oy = y + 28*sc + dy*sc*(20+i*18) + Math.cos(t*3+i)*8;
    const ox2 = ox + Math.sin(t*3+i)*20;
    const oy2 = oy + 18;
    ctx.beginPath();
    ctx.moveTo(ox,oy);
    ctx.quadraticCurveTo(ox2,oy2,ox+Math.sin(t+i)*12,oy+30);
    ctx.stroke();
  }

  // kite diamond body — bigger
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(sc,sc);
  // subtle tilt based on horizontal movement
  ctx.rotate(Math.sin(t)*0.12);

  const kw=22, kh=28;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.beginPath();ctx.ellipse(4,kh+6,kw*0.7,5,0,0,Math.PI*2);ctx.fill();

  // four quarters
  ctx.fillStyle='#ff3333';
  ctx.beginPath();ctx.moveTo(0,-kh);ctx.lineTo(kw,0);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ffdd00';
  ctx.beginPath();ctx.moveTo(0,-kh);ctx.lineTo(-kw,0);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#3388ff';
  ctx.beginPath();ctx.moveTo(0,kh);ctx.lineTo(kw,0);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#33cc55';
  ctx.beginPath();ctx.moveTo(0,kh);ctx.lineTo(-kw,0);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
  // outline + cross
  ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1.5/sc;
  ctx.beginPath();ctx.moveTo(0,-kh);ctx.lineTo(kw,0);ctx.lineTo(0,kh);ctx.lineTo(-kw,0);ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-kh);ctx.lineTo(0,kh);ctx.moveTo(-kw,0);ctx.lineTo(kw,0);ctx.stroke();
  // centre bow
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();

  ctx.restore();
  ctx.restore();
}

function drawSailboat(){
  const x=sailboat.x, y=sailboat.y;
  const bob=Math.sin(Date.now()*0.0015)*3;
  ctx.save();
  ctx.translate(x, y+bob);

  // hull
  ctx.fillStyle='#c8702a';
  ctx.beginPath();
  ctx.moveTo(-60,0);
  ctx.lineTo(60,0);
  ctx.lineTo(45,22);
  ctx.lineTo(-45,22);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1.5;ctx.stroke();

  // hull stripe
  ctx.fillStyle='#8b4513';
  ctx.fillRect(-60,-2,120,6);

  // mast
  ctx.strokeStyle='#4a3000';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-85);ctx.stroke();

  // main sail (white)
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.moveTo(0,-80);
  ctx.quadraticCurveTo(52,-45,48,0);
  ctx.lineTo(0,0);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(180,180,180,0.5)';ctx.lineWidth=1;ctx.stroke();

  // jib sail (light blue)
  ctx.fillStyle='rgba(180,220,255,0.88)';
  ctx.beginPath();
  ctx.moveTo(0,-75);
  ctx.lineTo(-50,-5);
  ctx.lineTo(0,-2);
  ctx.closePath();ctx.fill();

  // flag at top
  ctx.fillStyle='#ff3333';
  ctx.beginPath();ctx.moveTo(0,-85);ctx.lineTo(16,-76);ctx.lineTo(0,-68);ctx.closePath();ctx.fill();

  // small waves around hull
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;
  for(let i=-1;i<=1;i++){
    ctx.beginPath();
    ctx.moveTo(i*30-12,20+Math.sin(Date.now()*0.003+i)*2);
    ctx.quadraticCurveTo(i*30,18+Math.sin(Date.now()*0.003+i)*2,i*30+12,20+Math.sin(Date.now()*0.003+i)*2);
    ctx.stroke();
  }
  ctx.restore();
}

function draw(){
  drawBackground();
  if(currentScene==='park') drawKite();
  if(currentScene==='beach') drawSailboat();
  drawCans();
  trashItems.forEach(drawTrash);
  drawPlayer();
  drawParticles();
}

function loop(){
  if(running){update();}
  draw();
  requestAnimationFrame(loop);
}

// Change scene button
document.addEventListener('click', function(e){
  if(e.target.id==='changeSceneBtn'||e.target.closest('#changeSceneBtn')){
    running=false;
    document.getElementById('hud').style.display='none';
    sceneScreen.classList.add('hidden');
    winScreen.classList.add('hidden');
    buildCharGrid();
    charScreen.classList.remove('hidden');
  }
});
const charScreen=document.getElementById('charScreen');
const sceneScreen=document.getElementById('sceneScreen');
const winScreen=document.getElementById('winScreen');
const hud=document.getElementById('hud');
const dragHint=document.getElementById('dragHint');

function buildCharGrid(){
  const grid=document.getElementById('charGrid');
  grid.innerHTML='';
  CHARACTERS.forEach(c=>{
    const card=document.createElement('div');
    card.className='char-card'+(c.id===selectedChar.id?' selected':'');
    card.innerHTML=`<img class="char-img" src="${CHAR_PARTS[c.img].body}" alt="${c.name}" style="height:64px;width:auto;object-fit:contain;"><div class="name">${c.name}</div>`;
    card.onclick=()=>{
      selectedChar=c;
      document.querySelectorAll('.char-card').forEach(el=>el.classList.remove('selected'));
      card.classList.add('selected');
    };
    grid.appendChild(card);
  });
}
buildCharGrid();

document.getElementById('toSceneBtn').onclick=()=>{
  ensureAudio();
  document.getElementById('charNameLabel').textContent=selectedChar.name;
  charScreen.classList.add('hidden');
  sceneScreen.classList.remove('hidden');
};
document.getElementById('backToCharBtn').onclick=()=>{
  sceneScreen.classList.add('hidden');
  charScreen.classList.remove('hidden');
};

document.querySelectorAll('.scene-card').forEach(card=>{
  card.onclick=()=>{
    const scene=card.dataset.scene;
    sceneScreen.classList.add('hidden');
    sceneScreen.classList.toggle('beach-bg',false);
    startGame(scene);
  };
});

function startGame(scene){
  setupScene(scene);
  hud.style.display='flex';
  dragHint.style.display='block';
  dragHint.style.animation='none';
  requestAnimationFrame(()=>{ dragHint.style.animation='fadeHint 3.5s ease forwards'; });
  running=true;
}

function showWin(){
  document.getElementById('winScore').textContent=score;
  winScreen.classList.remove('hidden');
  winScreen.classList.toggle('beach-bg',currentScene==='beach');
  hud.style.display='none';
  sndWin();
  // confetti burst across screen
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      burst(rand(W*0.2,W*0.8),rand(H*0.2,H*0.5),['🎉','✨','🌟','💛','🟢'],8);
    },i*150);
  }
}

document.getElementById('playAgainBtn').onclick=()=>{
  winScreen.classList.add('hidden');
  startGame(currentScene);
};
document.getElementById('otherSceneBtn').onclick=()=>{
  winScreen.classList.add('hidden');
  sceneScreen.classList.remove('hidden');
};

// kick off render loop (draws idle background even before game starts)
currentScene='park';
drawBackground();
loop();
</script>
</body>
</html>
